<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touch — Sensory Room Animations</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  color:#fff;background:#07070c;
  background-image:radial-gradient(circle at 20% 10%,rgba(90,40,180,0.25),transparent 45%),
                   radial-gradient(circle at 85% 30%,rgba(0,120,180,0.22),transparent 45%),
                   radial-gradient(circle at 50% 100%,rgba(200,40,120,0.18),transparent 50%);
  padding:48px 24px 64px;
}
header{max-width:1100px;margin:0 auto 36px;text-align:center}
h1{font-size:clamp(34px,6vw,64px);font-weight:700;letter-spacing:-0.02em;
  background:linear-gradient(90deg,#b388ff,#7ad7ff,#ff8ad0);
  -webkit-background-clip:text;background-clip:text;color:transparent}
.tag{margin-top:12px;font-size:clamp(14px,2.2vw,18px);color:rgba(255,255,255,0.6);max-width:640px;margin-left:auto;margin-right:auto;line-height:1.5}
.grid{max-width:1100px;margin:0 auto;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.card{position:relative;display:block;text-decoration:none;color:inherit;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;padding:22px;min-height:150px;
  transition:transform 0.2s ease,border-color 0.2s ease,background 0.2s ease;overflow:hidden}
.card.live:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.09)}
.card .emoji{font-size:34px;line-height:1}
.card h2{font-size:20px;margin:14px 0 6px;font-weight:600}
.card p{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.45}
.card .glow{position:absolute;inset:0;opacity:0;transition:opacity 0.3s;pointer-events:none}
.card.live:hover .glow{opacity:1}
.badge{position:absolute;top:16px;right:16px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
  padding:4px 9px;border-radius:20px}
.badge.live{background:rgba(80,220,140,0.18);color:#7dffb0;border:1px solid rgba(80,220,140,0.4)}
.badge.soon{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.12)}
.card.soon{opacity:0.5;cursor:default}
footer{max-width:1100px;margin:48px auto 0;text-align:center;font-size:13px;color:rgba(255,255,255,0.35)}
footer a{color:rgba(255,255,255,0.55)}
</style>
</head>
<body>
<header>
  <h1>Touch</h1>
  <p class="tag">Fullscreen, multi-touch sensory animations for a touch projector.
     Tap any live tile to launch. Works fullscreen, responds to up to five fingers, and runs entirely offline.</p>
</header>

<main class="grid" id="grid"></main>

<footer>
  Open-source sensory room project ·
  <a href="https://github.com/Magnatronic/touch">github.com/Magnatronic/touch</a>
</footer>

<script>
// Each animation: file (null = not built yet), emoji, title, blurb, accent colour
const ITEMS = [
  {file:'fluid_sensory.html', emoji:'🌊', title:'Fluid',       blurb:'Liquid Navier–Stokes dye that swirls and mixes under your fingers.', accent:'#7ad7ff'},
  {file:'slime.html',        emoji:'🦠', title:'Slime Mould', blurb:'Living branching networks that rewire themselves around your touch.', accent:'#00ff88'},
  {file:'flock.html', emoji:'🐦', title:'Flock',         blurb:'Abstract swarms with steering behaviours that chase or scatter from your touch.', accent:'#9d7bff'},
  {file:null, emoji:'⏳', title:'Gravity Sand',  blurb:'Tens of thousands of grains that pile, pour and avalanche.', accent:'#e0c060'},
  {file:null, emoji:'🔮', title:'Kaleidoscope',  blurb:'Paint glowing mandalas reflected across symmetry axes.', accent:'#ff8ad0'},
  {file:null, emoji:'🎤', title:'Sound Visualiser', blurb:'The room becomes the instrument — microphone-driven visuals.', accent:'#8affd0'},
  {file:null, emoji:'🫧', title:'Bubble Wrap',   blurb:'A grid of glossy bubbles to pop, then watch reinflate.', accent:'#9ec5ff'},
  {file:null, emoji:'⚡', title:'Lightning',     blurb:'Storm nodes that arc lightning between every finger.', accent:'#a0e0ff'},
  {file:null, emoji:'💎', title:'Shatter',       blurb:'Crack a stained-glass pattern, then watch it reassemble.', accent:'#c0a0ff'},
];

const grid = document.getElementById('grid');
for (const it of ITEMS) {
  const live = !!it.file;
  const el = document.createElement(live ? 'a' : 'div');
  el.className = 'card ' + (live ? 'live' : 'soon');
  if (live) el.href = it.file;
  el.innerHTML = `
    <div class="glow" style="background:radial-gradient(circle at 50% 0%, ${it.accent}33, transparent 70%)"></div>
    <span class="badge ${live?'live':'soon'}">${live?'Live':'Soon'}</span>
    <div class="emoji">${it.emoji}</div>
    <h2>${it.title}</h2>
    <p>${it.blurb}</p>`;
  grid.appendChild(el);
}
</script>
</body>
</html>

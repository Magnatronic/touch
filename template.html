<style>
/* ===== FRAMEWORK-CSS START (synced by sync-framework.js — do not edit per file) ===== */

html,body{width:100%;height:100%;overflow:hidden;background:#000}

#ui:hover,#ui.open{opacity:1}
#menuExpand{display:none;flex-direction:column;align-items:center;gap:8px}
#ui.open #menuExpand{display:flex}
#quickRow{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;max-width:calc(100vw - 32px);

#quickRow::-webkit-scrollbar{display:none}
#bottomRow{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;max-width:calc(100vw - 32px);
  scrollbar-width:none;-ms-overflow-style:none}
#bottomRow::-webkit-scrollbar{display:none}
.btn{background:rgba(0,0,0,0.50);border:1px solid rgba(255,255,255,0.22);color:rgba(255,255,255,0.95);
  padding:9px 18px;border-radius:22px;font-size:13px;cursor:pointer;font-family:sans-serif;
  transition:all 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,0.9)}

.bbar{background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.20);color:rgba(255,255,255,0.95);

/* ── Settings panel ──────────────────────────────────────── */
#panel{position:fixed;left:50%;bottom:118px;transform:translate(-50%,12px);
  width:calc(100% - 32px);max-width:520px;background:rgba(0,0,0,0.85);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px 22px;z-index:20;
  opacity:0;pointer-events:none;transition:opacity 0.25s ease, transform 0.25s ease;

.sectn{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);margin:18px 0 8px}
.pane > .sectn:first-child{margin-top:2px}
.row{margin-bottom:14px}
.rowhead{display:flex;justify-content:space-between;align-items:center}

input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;margin-top:8px;
  background:rgba(255,255,255,0.15);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:#fff;cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.toggle{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.toggle label{color:rgba(255,255,255,0.7);font-size:13px}
.switch{position:relative;width:44px;height:24px;background:rgba(255,255,255,0.15);
  border-radius:12px;cursor:pointer;transition:background 0.2s}
.switch.on{background:rgba(120,180,255,0.7)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:transform 0.2s}
.switch.on::after{transform:translateX(20px)}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);
  transition:transform 0.15s;flex-shrink:0}

.swatch.active{border-color:#fff;transform:scale(1.1)}
.autochip{background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.20);
  color:rgba(255,255,255,0.95);height:28px;padding:0 12px;border-radius:14px;font-size:12px;cursor:pointer;
  font-family:sans-serif;transition:all 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  user-select:none;display:flex;align-items:center;flex:none;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,0.9)}
.autochip:hover{background:rgba(0,0,0,0.68)}
.autochip.active{background:rgba(0,0,0,0.65);border-color:#fff}
.picker{position:relative;width:24px;height:24px;border-radius:50%;overflow:hidden;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.25);cursor:pointer;
  background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)}
.picker.active{border-color:#fff}
.picker input{position:absolute;inset:-4px;width:200%;height:200%;opacity:0;cursor:pointer;border:none;padding:0}
.qsep{color:rgba(255,255,255,0.25);font-size:18px;line-height:28px;user-select:none;flex-shrink:0}
.bgpick{position:relative;overflow:hidden;cursor:pointer;font-size:11px;
  color:rgba(255,255,255,0.75);padding:0 10px;height:28px;border-radius:14px}
.bgpick input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 14px}
.chip{padding:7px 13px;border-radius:16px;background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.20);color:rgba(255,255,255,0.95);font-size:12px;cursor:pointer;
  font-family:sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  user-select:none;transition:all 0.15s;text-shadow:0 1px 3px rgba(0,0,0,0.9)}
.chip:hover{background:rgba(0,0,0,0.65)}
.chip.active{background:rgba(0,0,0,0.65);border-color:#fff;color:#fff}
.pane{display:none}
.pane.active{display:block}
#stats{position:fixed;top:10px;left:12px;z-index:30;display:none;
  font:12px/1.4 ui-monospace,Menlo,Consolas,monospace;color:rgba(255,255,255,0.85);
  background:rgba(0,0,0,0.45);padding:6px 9px;border-radius:8px;pointer-events:none;white-space:pre}

<body>

<script>
'use strict';
/* ===== FRAMEWORK-JS START (synced by sync-framework.js — do not edit per file) =====
   Shared scaffolding for every animation: settings + persistence, colour system,
   audio engine, 5-touch input, the settings panel, and the lifecycle/render loop.
   The animation supplies an `Anim` object (see ANIMATION block below) with:
     themes, defaults, schema, sectionLabel, init(canvas), resize(w,h),
     splat(x,y,dx,dy,color,opts), frame(dt), reset()
   Coordinates passed to splat() are normalised 0..1 with y pointing UP.
*/

const canvas   = document.getElementById('c');
const ui       = document.getElementById('ui');
const panel    = document.getElementById('panel');
const quickRow = document.getElementById('quickRow');

const STORE_KEY = 'settings:' + location.pathname.split('/').pop();

// Settings shared by every animation (the animation adds its own via Anim.defaults)
const SHARED_DEFAULTS = {
  volume:0.30, bg:'#000000', lockedColor:null,
  voice:'pure', scale:'penta', reverb:false, echo:false, chorus:false, mute:false,
  quality:'auto', showStats:false,
};

let SETTINGS = {}, currentTheme = '', colorIdx = 0;
let bgRGB = [0,0,0];
let currentQuickMode = null;

function initSettings(){
  SETTINGS = Object.assign({}, SHARED_DEFAULTS, Anim.defaults||{});
  try { SETTINGS = Object.assign(SETTINGS, JSON.parse(localStorage.getItem(STORE_KEY)||'{}')); } catch(e){}
  const themeKeys = Object.keys(Anim.themes);
  currentTheme = themeKeys.includes(SETTINGS.theme) ? SETTINGS.theme : themeKeys[0];
  bgRGB = hexToRGB(SETTINGS.bg);
  perfLevel = (SETTINGS.quality && SETTINGS.quality!=='auto') ? SETTINGS.quality : 'high';
}

// ── Performance / quality (auto-scaling + manual override) ──────────────────────
const QUALITY = { auto:{label:'Auto'}, high:{label:'High'}, med:{label:'Medium'}, low:{label:'Low'} };
const PERF_ORDER = ['low','med','high'];
let perfLevel = 'high', qCooldown = 0;
function activeQuality(){ return perfLevel; }
function setPerf(level){ if(level===perfLevel) return; perfLevel=level; if(Anim.setQuality) Anim.setQuality(level); }
function autoPerf(fps){
  if(qCooldown>0){ qCooldown--; return; }
  const i=PERF_ORDER.indexOf(perfLevel);
  if(fps<42 && i>0){ setPerf(PERF_ORDER[i-1]); qCooldown=4; }
  else if(fps>56 && i<2){ setPerf(PERF_ORDER[i+1]); qCooldown=8; }
}
function updateStats(fps){
  const el=document.getElementById('stats'); if(!el) return;
  const touches=pointers.filter(p=>p.down).length;
  el.textContent = Math.round(fps)+' fps   quality: '+perfLevel+(SETTINGS.quality==='auto'?' (auto)':'')+'   touches: '+touches;
}
function applyStats(){ const el=document.getElementById('stats'); if(el) el.style.display = SETTINGS.showStats?'block':'none'; }
function saveSettings(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(SETTINGS)); }catch(e){} }

function hexToRGB(h){
  h=h.replace('#','');
  return [parseInt(h.substr(0,2),16)/255, parseInt(h.substr(2,2),16)/255, parseInt(h.substr(4,2),16)/255];
}
function applyBg(){ bgRGB = hexToRGB(SETTINGS.bg); }

// ── Colour ────────────────────────────────────────────────────────────────────
const VIVID = 1.25;
function pickColor(){
  let c;
  if (SETTINGS.lockedColor) c = SETTINGS.lockedColor;
  else { const cols = Anim.themes[currentTheme].colors; c = cols[colorIdx++ % cols.length]; }
  return [c[0]*VIVID, c[1]*VIVID, c[2]*VIVID];
}

const STANDARD_SWATCHES = [
  [1,0.12,0.12],[1,0.50,0.0],[1,0.90,0.05],[0.12,0.85,0.12],
  [0.0,0.80,1.0],[0.15,0.35,1.0],[0.65,0.15,1.0],[1,1,1],
];

// ── Audio engine ───────────────────────────────────────────────────────────────
let audioCtx=null, masterGain=null, convolver=null, reverbWet=null, echoWet=null, chorusWet=null, limiter=null;

const VOICES = {
  pure:  {label:'Pure',  oct:0,  gain:0.12, filter:{type:'lowpass', base:1300, track:1600}, lfo:{rate:5,depth:0.007},
    oscs:[{type:'sine'}]},
  warm:  {label:'Warm',  oct:0,  gain:0.13, filter:{type:'lowpass', base:780,  track:1100}, lfo:{rate:4,depth:0.005},
    oscs:[{type:'triangle'},{type:'sine',detune:7,gain:0.6},{type:'sine',detune:-7,gain:0.6}]},
  bell:  {label:'Bell',  oct:0,  gain:0.12, filter:{type:'lowpass', base:4500, track:2000}, lfo:{rate:0,depth:0},
    oscs:[{type:'sine'},{type:'sine',ratio:2.76,gain:0.5,decayTo:0.04},{type:'sine',ratio:5.4,gain:0.25,decayTo:0.02}]},
  glass: {label:'Glass', oct:0,  gain:0.13, filter:{type:'highpass',base:350,  track:250},  lfo:{rate:7,depth:0.012},
    oscs:[{type:'sine'},{type:'sine',ratio:3.0,gain:0.45,decayTo:0.35},{type:'sine',ratio:4.2,gain:0.22,decayTo:0.25}]},
  deep:  {label:'Deep',  oct:-1, gain:0.18, filter:{type:'lowpass', base:700,  track:900},  lfo:{rate:2,depth:0.005},
    oscs:[{type:'sine'},{type:'sine',ratio:2,gain:0.55},{type:'sine',ratio:3,gain:0.2}]},
  pluck: {label:'Pluck', oct:0,  gain:0.18, filter:{type:'lowpass', base:1800, track:1600}, lfo:{rate:0,depth:0}, pluck:1.6,
    oscs:[{type:'triangle'},{type:'sine',ratio:2,gain:0.3}]},
  synth: {label:'Synth', oct:0,  gain:0.10, filter:{type:'lowpass', base:600,  track:2800, q:7}, lfo:{rate:0,depth:0},
    oscs:[{type:'sawtooth'},{type:'sawtooth',detune:11,gain:0.7},{type:'sawtooth',detune:-11,gain:0.7}]},
  retro: {label:'Retro', oct:0,  gain:0.09, filter:{type:'lowpass', base:2600, track:1400}, lfo:{rate:6,depth:0.004},
    oscs:[{type:'square'}]},
  pad:   {label:'Pad',   oct:-1, gain:0.11, filter:{type:'lowpass', base:500,  track:1400, q:2}, lfo:{rate:3,depth:0.006},
    oscs:[{type:'sawtooth',detune:6,gain:0.6},{type:'sawtooth',detune:-6,gain:0.6},{type:'sine',ratio:2,gain:0.3}]},
};
const SCALES = {
  penta: {label:'Pentatonic', steps:[0,2,4,7,9]},
  major: {label:'Major',      steps:[0,2,4,5,7,9,11]},
  minor: {label:'Minor',      steps:[0,2,3,5,7,8,10]},
  whole: {label:'Whole-tone', steps:[0,2,4,6,8,10]},
};
let FREQS=[];
function buildScale(){
  const base=130.81, steps=(SCALES[SETTINGS.scale]||SCALES.penta).steps, arr=[];
  for(let oct=0;oct<3;oct++) for(const s of steps) arr.push(base*Math.pow(2,(s+12*oct)/12));
  FREQS=arr;
}
function freqForX(x){ const i=Math.max(0,Math.min(FREQS.length-1,Math.floor(x*FREQS.length))); return FREQS[i]||110; }

function makeImpulse(ac,dur,decay){
  const len=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(2,len,ac.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}
function getAudio(){
  if(!audioCtx){
    const ac=audioCtx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    masterGain=ac.createGain(); masterGain.gain.value=SETTINGS.mute?0:SETTINGS.volume;
    // Chorus
    const chDelay=ac.createDelay(); chDelay.delayTime.value=0.026;
    const chLfo=ac.createOscillator(); chLfo.frequency.value=0.6;
    const chDepth=ac.createGain(); chDepth.gain.value=0.004;
    chLfo.connect(chDepth); chDepth.connect(chDelay.delayTime); chLfo.start();
    chorusWet=ac.createGain(); chorusWet.gain.value=SETTINGS.chorus?0.6:0;
    const busA=ac.createGain();
    masterGain.connect(busA);
    masterGain.connect(chDelay); chDelay.connect(chorusWet); chorusWet.connect(busA);
    // Echo
    const ecDelay=ac.createDelay(); ecDelay.delayTime.value=0.33;
    const ecFb=ac.createGain(); ecFb.gain.value=0.42;
    ecDelay.connect(ecFb); ecFb.connect(ecDelay);
    echoWet=ac.createGain(); echoWet.gain.value=SETTINGS.echo?0.5:0;
    const busB=ac.createGain();
    busA.connect(busB);
    busA.connect(ecDelay); ecDelay.connect(echoWet); echoWet.connect(busB);
    // Limiter
    limiter=ac.createDynamicsCompressor();
    limiter.threshold.value=-3; limiter.knee.value=0; limiter.ratio.value=20;
    limiter.attack.value=0.003; limiter.release.value=0.25;
    limiter.connect(ac.destination);
    // Reverb
    convolver=ac.createConvolver(); convolver.buffer=makeImpulse(ac,3.8,2.0);
    reverbWet=ac.createGain(); reverbWet.gain.value=SETTINGS.reverb?0.9:0;
    busB.connect(limiter);
    busB.connect(convolver); convolver.connect(reverbWet); reverbWet.connect(limiter);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function applyVolume(){ if(masterGain) masterGain.gain.setTargetAtTime(SETTINGS.mute?0:SETTINGS.volume, audioCtx.currentTime, 0.05); }
function applyReverb(){ if(reverbWet) reverbWet.gain.setTargetAtTime(SETTINGS.reverb?0.9:0, audioCtx.currentTime, 0.1); }
function applyEcho(){   if(echoWet)   echoWet.gain.setTargetAtTime(SETTINGS.echo?0.5:0,     audioCtx.currentTime, 0.1); }
function applyChorus(){ if(chorusWet) chorusWet.gain.setTargetAtTime(SETTINGS.chorus?0.6:0, audioCtx.currentTime, 0.1); }

let voiceSeq=0; const voices={}; const MAX_VOICES=16;
function startVoice(x,y){
  try{
    if(Object.keys(voices).length>=MAX_VOICES) return 0;
    const ac=getAudio(), vid=++voiceSeq, V=VOICES[SETTINGS.voice]||VOICES.pure;
    const freq=freqForX(x)*Math.pow(2,V.oct), t=ac.currentTime;
    const gain=ac.createGain();
    const pan=ac.createStereoPanner(); pan.pan.value=(x*2-1)*0.6;
    const filt=ac.createBiquadFilter(); filt.type=V.filter.type; filt.frequency.value=V.filter.base+y*V.filter.track;
    if(V.filter.q) filt.Q.value=V.filter.q;
    filt.connect(gain); gain.connect(pan); pan.connect(masterGain);
    const nodes=[];
    for(const o of V.oscs){
      const ratio=o.ratio||1;
      const osc=ac.createOscillator(); osc.type=o.type||'sine'; osc.frequency.value=freq*ratio;
      if(o.detune) osc.detune.value=o.detune;
      const g=ac.createGain(); g.gain.setValueAtTime(o.gain!==undefined?o.gain:1, t);
      if(o.decayTo!==undefined) g.gain.setTargetAtTime((o.gain!==undefined?o.gain:1)*o.decayTo, t, 0.5);
      osc.connect(g); g.connect(filt); osc.start();
      nodes.push({osc,ratio});
    }
    let lfo=null;
    if(V.lfo.rate>0){
      lfo=ac.createOscillator(); const lfoG=ac.createGain();
      lfo.frequency.value=V.lfo.rate; lfoG.gain.value=freq*V.lfo.depth;
      lfo.connect(lfoG); nodes.forEach(n=>lfoG.connect(n.osc.frequency)); lfo.start();
    }
    gain.gain.setValueAtTime(0.0001,t);
    gain.gain.linearRampToValueAtTime(V.gain,t+0.02);
    if(V.pluck) gain.gain.exponentialRampToValueAtTime(0.0008, t+0.02+V.pluck);
    voices[vid]={nodes,lfo,gain,pan,filt,freq,V};
    return vid;
  }catch(e){ return 0; }
}
function moveVoice(vid,x,y,speed){
  const v=voices[vid]; if(!v) return;
  try{
    const now=getAudio().currentTime, V=v.V;
    v.freq=freqForX(x)*Math.pow(2,V.oct);
    v.nodes.forEach(n=>n.osc.frequency.setTargetAtTime(v.freq*n.ratio,now,0.06));
    v.pan.pan.setTargetAtTime((x*2-1)*0.6,now,0.08);
    v.filt.frequency.setTargetAtTime(V.filter.base+y*V.filter.track,now,0.08);
  }catch(e){}
}
function stopVoice(vid){
  const v=voices[vid]; if(!v) return;
  delete voices[vid];
  try{
    const ac=getAudio(), t=ac.currentTime;
    v.gain.gain.cancelScheduledValues(t);
    v.gain.gain.setValueAtTime(v.gain.gain.value,t);
    v.gain.gain.setTargetAtTime(0,t,0.25);
    const stopAt=t+1.2;
    v.nodes.forEach(n=>{try{n.osc.stop(stopAt);}catch(e){}});
    if(v.lfo){try{v.lfo.stop(stopAt);}catch(e){}}
    v.nodes[0].osc.onended=()=>{try{v.gain.disconnect();v.pan.disconnect();v.filt.disconnect();}catch(e){}};
  }catch(e){}
}

// ── Input (up to 5 independent touches + mouse fallback) ───────────────────────
class Pointer {
  constructor(id){ this.id=id; this.x=0; this.y=0; this.px=0; this.py=0;
    this.dx=0; this.dy=0; this.down=false; this.moved=false; this.color=[1,1,1]; this.voice=0; }
}
const pointers = [];
function getPointer(id){ let p=pointers.find(p=>p.id===id); if(!p){p=new Pointer(id); pointers.push(p);} return p; }
function toSim(x,y){ return { x: x/canvas.clientWidth, y: 1-y/canvas.clientHeight }; }

function onDown(id, cx, cy){
  const p=getPointer(id), s=toSim(cx,cy);
  p.x=s.x; p.y=s.y; p.px=s.x; p.py=s.y; p.dx=0; p.dy=0;
  p.down=true; p.moved=false; p.color=pickColor();
  if(p.voice) stopVoice(p.voice);
  p.voice=startVoice(s.x,s.y);
}
function onMove(id, cx, cy){
  const p=pointers.find(p=>p.id===id);
  if(!p || !p.down) return;
  const s=toSim(cx,cy);
  p.dx=s.x-p.x; p.dy=s.y-p.y; p.x=s.x; p.y=s.y;
  moveVoice(p.voice, s.x, s.y, Math.hypot(p.dx,p.dy));
}
function onUp(id){
  const i=pointers.findIndex(p=>p.id===id); if(i<0) return;
  const p=pointers[i]; p.down=false; stopVoice(p.voice); p.voice=0;
  pointers.splice(i,1);
}
canvas.addEventListener('mousedown',e=>{ onDown('mouse',e.offsetX,e.offsetY); });
canvas.addEventListener('mousemove',e=>{ onMove('mouse',e.offsetX,e.offsetY); });
window.addEventListener('mouseup',()=>{ onUp('mouse'); });
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect();
  for(const t of e.changedTouches) onDown(t.identifier,t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect();
  for(const t of e.changedTouches) onMove(t.identifier,t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchend',e=>{ for(const t of e.changedTouches) onUp(t.identifier); },{passive:false});
canvas.addEventListener('touchcancel',e=>{ for(const t of e.changedTouches) onUp(t.identifier); },{passive:false});

// ── Settings panel UI ──────────────────────────────────────────────────────────
function rgbCss(c){ return `rgb(${Math.round(Math.min(c[0],1)*255)},${Math.round(Math.min(c[1],1)*255)},${Math.round(Math.min(c[2],1)*255)})`; }

function setTheme(name){
  currentTheme=name; SETTINGS.theme=name; saveSettings();
  if(currentQuickMode==='theme') buildQuickTheme();
}

function buildQuickTheme(){
  quickRow.innerHTML='';
  for(const k in Anim.themes){
    const b=document.createElement('button'); b.className='chip'+(k===currentTheme?' active':'');
    b.textContent=Anim.themes[k].label||k;
    b.addEventListener('click',e=>{ e.stopPropagation(); getAudio(); setTheme(k); });
    quickRow.appendChild(b);
  }
}

function buildQuickStyle(){
  quickRow.innerHTML='';
  if(!Anim.styles) return;
  const activeKey=getCurrentStyleKey();
  for(const k in Anim.styles){
    const b=document.createElement('button'); b.className='chip'+(k===activeKey?' active':'');
    b.textContent=Anim.styles[k].label||k;
    b.addEventListener('click',e=>{ e.stopPropagation(); getAudio(); applyStyle(k); });
    quickRow.appendChild(b);
  }
}

function getCurrentStyleKey(){
  if(!Anim.styles) return null;
  for(const k in Anim.styles){
    const s=Anim.styles[k]; let match=true;
    for(const key in s){ if(key==='label') continue; if(SETTINGS[key]!==s[key]){match=false;break;} }
    if(match) return k;
  }
  return null;
}

function applyStyle(key){
  const s=Anim.styles&&Anim.styles[key]; if(!s) return;
  for(const k in s){ if(k!=='label') SETTINGS[k]=s[k]; }
  saveSettings();
  if(currentQuickMode==='style') buildQuickStyle();
}

function buildQuickColour(){
  quickRow.innerHTML='';
  // Auto button
  const auto=document.createElement('button'); auto.className='autochip'+(SETTINGS.lockedColor?'':' active');
  auto.textContent='↻ Auto';
  auto.addEventListener('click',e=>{ e.stopPropagation(); getAudio(); lockColour(null); });
  quickRow.appendChild(auto);
  // Standard colour swatches
  STANDARD_SWATCHES.forEach(c=>{
    const sw=document.createElement('div'); sw.className='swatch'; sw._rgb=c; sw.style.background=rgbCss(c);
    const lk=SETTINGS.lockedColor;
    if(lk) sw.classList.toggle('active',Math.abs(c[0]-lk[0])<0.05&&Math.abs(c[1]-lk[1])<0.05&&Math.abs(c[2]-lk[2])<0.05);
    sw.addEventListener('click',e=>{ e.stopPropagation(); getAudio(); lockColour(c); });
    quickRow.appendChild(sw);
  });
  // Custom colour picker
  const pk=document.createElement('label'); pk.className='picker'; pk.title='Pick a custom colour';
  const inp=document.createElement('input'); inp.type='color';
  inp.value=SETTINGS.lockedColor?'#'+SETTINGS.lockedColor.map(v=>('0'+Math.round(Math.min(v,1)*255).toString(16)).slice(-2)).join(''):'#ffffff';
  inp.addEventListener('input',e=>{ e.stopPropagation(); getAudio(); lockColour(hexToRGB(inp.value)); });
  pk.addEventListener('click',e=>e.stopPropagation());
  pk.appendChild(inp); quickRow.appendChild(pk);
  // Divider
  const sep=document.createElement('span'); sep.className='qsep'; sep.textContent='┊'; quickRow.appendChild(sep);
  // Background colour picker
  const bgpk=document.createElement('label'); bgpk.className='bbar bgpick'; bgpk.title='Background colour';
  bgpk.textContent='bg:';
  const bgInp=document.createElement('input'); bgInp.type='color'; bgInp.value=SETTINGS.bg;
  bgInp.addEventListener('input',e=>{ e.stopPropagation(); SETTINGS.bg=bgInp.value; saveSettings(); applyBg(); });
  bgpk.addEventListener('click',e=>e.stopPropagation());
  bgpk.appendChild(bgInp); quickRow.appendChild(bgpk);
  refreshQuickColour();
}

function refreshQuickColour(){
  if(currentQuickMode!=='colour') return;
  const lk=SETTINGS.lockedColor;
  const auto=quickRow.querySelector('.autochip'); if(auto) auto.classList.toggle('active',!lk);
  quickRow.querySelectorAll('.swatch').forEach(sw=>{
    const c=sw._rgb;
    sw.classList.toggle('active',!!lk&&!!c&&Math.abs(c[0]-lk[0])<0.05&&Math.abs(c[1]-lk[1])<0.05&&Math.abs(c[2]-lk[2])<0.05);
  });
  const pk=quickRow.querySelector('.picker'); if(pk) pk.classList.toggle('active',!!lk&&!quickRow.querySelector('.swatch.active'));
}

function lockColour(rgb){ SETTINGS.lockedColor=rgb?rgb.slice():null; saveSettings(); refreshQuickColour(); }

function makeSlider(item){
  const row=document.createElement('div'); row.className='row';
  const head=document.createElement('div'); head.className='rowhead';
  const lab=document.createElement('label'); lab.textContent=item.label;
  const val=document.createElement('span'); val.className='val';
  head.appendChild(lab); head.appendChild(val);
  const inp=document.createElement('input');
  inp.type='range'; inp.min=item.min; inp.max=item.max; inp.step=item.step; inp.value=SETTINGS[item.key];
  val.textContent=Number(SETTINGS[item.key]).toFixed(item.dp);
  inp.addEventListener('input',()=>{
    const v=parseFloat(inp.value); SETTINGS[item.key]=v; val.textContent=v.toFixed(item.dp);
    if(item.key==='volume') applyVolume();
    saveSettings();
  });
  row.appendChild(head); row.appendChild(inp);
  return row;
}
function makeToggle(label,key,onChange){
  const row=document.createElement('div'); row.className='toggle';
  const lab=document.createElement('label'); lab.textContent=label;
  const sw=document.createElement('div'); sw.className='switch'+(SETTINGS[key]?' on':'');
  sw.addEventListener('click',e=>{ e.stopPropagation(); getAudio();
    SETTINGS[key]=!SETTINGS[key]; sw.classList.toggle('on',SETTINGS[key]); saveSettings(); if(onChange) onChange(); });
  row.appendChild(lab); row.appendChild(sw);
  return row;
}
function makeChips(label,key,map,onChange){
  const wrap=document.createElement('div');
  const sec=document.createElement('div'); sec.className='sectn'; sec.textContent=label; wrap.appendChild(sec);
  const chips=document.createElement('div'); chips.className='chips';
  for(const k in map){
    const c=document.createElement('div'); c.className='chip'+(SETTINGS[key]===k?' active':'');
    c.textContent=map[k].label;
    c.addEventListener('click',e=>{ e.stopPropagation(); getAudio();
      SETTINGS[key]=k; saveSettings();
      chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); c.classList.add('active');
      if(onChange) onChange(); });
    chips.appendChild(c);
  }
  wrap.appendChild(chips); return wrap;
}

function buildControlsPanel(){
  const el=document.getElementById('controlsContent'); el.innerHTML='';
  const h=document.createElement('div'); h.className='sectn'; h.textContent=Anim.sectionLabel||'Controls'; el.appendChild(h);
  (Anim.schema||[]).forEach(it=>{
    if(it.type==='toggle') el.appendChild(makeToggle(it.label,it.key));
    else if(it.type==='preset-chips') el.appendChild(makeChips(it.label,it.key,it.options));
    else el.appendChild(makeSlider(it));
  });
  el.appendChild(makeChips('Performance','quality',QUALITY,()=>{ if(SETTINGS.quality!=='auto') setPerf(SETTINGS.quality); }));
  el.appendChild(makeToggle('Show performance','showStats',applyStats));
  const resetBtn=document.createElement('button'); resetBtn.className='btn';
  resetBtn.style.cssText='margin-top:14px;width:100%;text-align:center';
  resetBtn.textContent='↺ Reset settings';
  resetBtn.addEventListener('click',e=>{ e.stopPropagation();
    SETTINGS=Object.assign({},SHARED_DEFAULTS,Anim.defaults||{}); saveSettings();
    const tk=Object.keys(Anim.themes); currentTheme=tk.includes(SETTINGS.theme)?SETTINGS.theme:tk[0];
    buildControlsPanel(); buildSoundPanel(); buildScale();
    applyVolume(); applyReverb(); applyEcho(); applyChorus(); applyBg();
    if(Anim.reset) Anim.reset();
    if(currentQuickMode==='theme') buildQuickTheme();
    else if(currentQuickMode==='style') buildQuickStyle();
    else if(currentQuickMode==='colour') buildQuickColour();
  });
  el.appendChild(resetBtn);
}

function buildSoundPanel(){
  const snd=document.getElementById('soundControls'); snd.innerHTML='';
  snd.appendChild(makeChips('Voice','voice',VOICES));
  snd.appendChild(makeChips('Scale / mood','scale',SCALES,buildScale));
  const fx=document.createElement('div'); fx.className='sectn'; fx.textContent='Effects'; snd.appendChild(fx);
  snd.appendChild(makeToggle('Reverb','reverb',applyReverb));
  snd.appendChild(makeToggle('Echo',  'echo',  applyEcho));
  snd.appendChild(makeToggle('Chorus','chorus',applyChorus));
  snd.appendChild(makeToggle('Mute',  'mute',  applyVolume));
  snd.appendChild(makeSlider({key:'volume',label:'Volume',min:0,max:1,step:0.01,dp:2}));
}

// ── Menu bar ───────────────────────────────────────────────────────────────────
function closePanel(){ panel.classList.remove('open'); document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active')); }
function showPanel(name){
  const id=name==='controls'?'paneControls':'paneSound';
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id===id));
  panel.classList.add('open');
}
function updateBarButtons(){
  document.querySelectorAll('.bbar[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===currentQuickMode));
}
function showQuickMode(mode){
  if(currentQuickMode===mode){ currentQuickMode=null; quickRow.innerHTML=''; closePanel(); updateBarButtons(); return; }
  currentQuickMode=mode; updateBarButtons(); closePanel(); quickRow.innerHTML='';
  if(mode==='controls') showPanel('controls');
  else if(mode==='sound') showPanel('sound');
  else if(mode==='theme') buildQuickTheme();
  else if(mode==='style') buildQuickStyle();
  else if(mode==='colour') buildQuickColour();
}

document.getElementById('collapse').addEventListener('click',e=>{
  e.stopPropagation(); getAudio();
  if(ui.classList.contains('open')){
    ui.classList.remove('open'); currentQuickMode=null; quickRow.innerHTML='';
    closePanel(); updateBarButtons();
  } else {
    ui.classList.add('open'); showQuickMode('theme');
  }
});
document.querySelectorAll('.bbar[data-mode]').forEach(btn=>{
  btn.addEventListener('click',e=>{ e.stopPropagation(); getAudio(); showQuickMode(btn.dataset.mode); });
});
document.getElementById('btnClear').addEventListener('click',e=>{ e.stopPropagation(); if(Anim.reset) Anim.reset(); });
panel.addEventListener('mousedown',e=>e.stopPropagation());
panel.addEventListener('touchstart',e=>e.stopPropagation(),{passive:false});

// ── Lifecycle / render loop ──────────────────────────────────────────────────────
let glLost=false, lastTime=Date.now(), fpsAccum=0, fpsFrames=0;
function sizeCanvas(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=Math.round(canvas.clientWidth*dpr), h=Math.round(canvas.clientHeight*dpr);
  if(canvas.width!==w || canvas.height!==h){ canvas.width=w; canvas.height=h; if(Anim.resize) Anim.resize(w,h); }
}
function setupGL(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.round(canvas.clientWidth*dpr)||canvas.width;
  canvas.height=Math.round(canvas.clientHeight*dpr)||canvas.height;
  if(Anim.init) Anim.init(canvas);
  if(Anim.resize) Anim.resize(canvas.width,canvas.height);
}
function loop(){
  if(glLost){ requestAnimationFrame(loop); return; }
  sizeCanvas();
  const now=Date.now(), rawDt=(now-lastTime)/1000; lastTime=now;
  const dt=Math.min(rawDt,0.033);  // cap at ~30fps equivalent; prevents physics explosion without causing slow-motion
  fpsAccum+=rawDt; fpsFrames++;    // use real elapsed time so FPS counter reflects actual frame rate
  if(fpsAccum>=1){ const fps=fpsFrames/fpsAccum; fpsAccum=0; fpsFrames=0;
    if(SETTINGS.quality==='auto') autoPerf(fps);
    if(SETTINGS.showStats) updateStats(fps); }
  const cap = perfLevel==='low'?4 : perfLevel==='med'?6 : 10;
  for(const p of pointers){
    if(p.down){
      const mdx=p.x-p.px, mdy=p.y-p.py, dist=Math.hypot(mdx,mdy);
      if(!p.moved){ Anim.splat(p.x,p.y,0,0,p.color,{velScale:0}); p.moved=true; }
      else if(dist>0.00001){
        const steps=Math.min(Math.max(1,Math.ceil(dist/0.012)),cap);
        for(let i=1;i<=steps;i++){ const t=i/steps; Anim.splat(p.px+mdx*t,p.py+mdy*t,p.dx,p.dy,p.color,{velScale:1/steps}); }
      }
      p.px=p.x; p.py=p.y; p.dx*=0.85; p.dy*=0.85;
    }
  }
  Anim.frame(dt);
  requestAnimationFrame(loop);
}
function boot(){
  initSettings();
  buildScale();
  buildControlsPanel();
  buildSoundPanel();
  setTheme(currentTheme);
  applyBg();
  applyStats();
  if(!Anim.styles) document.getElementById('btnStyle').style.display='none';
  setupGL();
  canvas.addEventListener('webglcontextlost', e=>{ e.preventDefault(); glLost=true; }, false);
  canvas.addEventListener('webglcontextrestored', ()=>{ glLost=false; setupGL(); }, false);
  loop();
}

/* ===== ANIMATION START =====
   Replace everything in this block to make a new animation. Provide an `Anim`
   object with the hooks the framework calls. This placeholder paints soft
   glowing blobs on a Canvas2D context that fade toward the background colour.
*/
const Anim = {
  sectionLabel: 'Brush',
  themes: {
    sunset: {label:'🌅 Sunset', colors:[[1,0.5,0.1],[1,0.2,0.3],[1,0.8,0.2],[0.9,0.3,0.5],[1,0.6,0.0]]},
    ocean:  {label:'🌊 Ocean',  colors:[[0,0.6,1],[0,1,0.8],[0.1,0.3,0.9],[0,0.8,0.6],[0.4,0.9,1]]},
    candy:  {label:'🍬 Candy',  colors:[[1,0.4,0.8],[0.6,0.4,1],[0.3,0.8,1],[1,0.8,0.3],[0.5,1,0.6]]},
    mono:   {label:'⚪ Mono',   colors:[[1,1,1],[0.8,0.85,1],[0.7,0.9,1],[0.9,0.9,0.95],[1,0.95,0.9]]},
  },
  defaults: { theme:'sunset', brushSize:0.10, fade:0.05 },
  schema: [
    {key:'brushSize', label:'Brush size', min:0.02, max:0.30, step:0.01, dp:2},
    {key:'fade',      label:'Fade speed',  min:0.0,  max:0.20, step:0.005, dp:3},
  ],
  _ctx: null,
  init(cv){ this._ctx = cv.getContext('2d'); this.reset(); },
  resize(w,h){ this.reset(); },   // a 2D canvas clears when resized
  splat(x,y,dx,dy,color){
    const ctx=this._ctx; if(!ctx) return;
    const W=canvas.width, H=canvas.height;
    const px=x*W, py=(1-y)*H, r=Math.max(6, SETTINGS.brushSize*H*0.5);
    const col=`${Math.min(color[0],1)*255|0},${Math.min(color[1],1)*255|0},${Math.min(color[2],1)*255|0}`;
    const g=ctx.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0,`rgba(${col},0.85)`); g.addColorStop(1,`rgba(${col},0)`);
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
  },
  frame(dt){
    const ctx=this._ctx; if(!ctx) return;
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=`rgba(${bgRGB[0]*255|0},${bgRGB[1]*255|0},${bgRGB[2]*255|0},${SETTINGS.fade})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  },
  reset(){
    const ctx=this._ctx; if(!ctx) return;
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=`rgb(${bgRGB[0]*255|0},${bgRGB[1]*255|0},${bgRGB[2]*255|0})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  },
};
/* ===== ANIMATION END ===== */

boot();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fluid – Sensory Room</title>
<style>
/* ===== FRAMEWORK-CSS START (synced by sync-framework.js — do not edit per file) ===== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;touch-action:none}

/* ── Control bar ─────────────────────────────────────────── */
#ui{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:10;opacity:0.45;transition:opacity 0.4s;align-items:center}
#ui:hover,#ui.open{opacity:1}
.btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.9);
  padding:9px 18px;border-radius:22px;font-size:13px;cursor:pointer;font-family:sans-serif;
  transition:all 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;white-space:nowrap}
.btn.active,.btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.5)}
#collapse{padding:10px 16px;font-size:16px}
.cat{display:none}
#ui.menu .cat{display:inline-flex}

/* ── Settings panel ──────────────────────────────────────── */
#panel{position:fixed;left:50%;bottom:74px;transform:translate(-50%,12px);
  width:calc(100% - 32px);max-width:520px;background:rgba(0,0,0,0.85);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px 22px;z-index:20;
  opacity:0;pointer-events:none;transition:opacity 0.25s ease, transform 0.25s ease;
  font-family:sans-serif;color:#fff;max-height:72vh;overflow-y:auto}
#panel.open{opacity:1;transform:translate(-50%,0);pointer-events:auto}
.sectn{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);margin:18px 0 8px}
.pane > .sectn:first-child{margin-top:2px}
.row{margin-bottom:14px}
.rowhead{display:flex;justify-content:space-between;align-items:center}
.rowhead label{color:rgba(255,255,255,0.7);font-size:13px}
.rowhead .val{color:rgba(255,255,255,0.5);font-size:13px;font-variant-numeric:tabular-nums}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;margin-top:8px;
  background:rgba(255,255,255,0.15);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:#fff;cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.toggle{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.toggle label{color:rgba(255,255,255,0.7);font-size:13px}
.switch{position:relative;width:44px;height:24px;background:rgba(255,255,255,0.15);
  border-radius:12px;cursor:pointer;transition:background 0.2s}
.switch.on{background:rgba(120,180,255,0.7)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:transform 0.2s}
.switch.on::after{transform:translateX(20px)}
.panelBtns{display:flex;gap:10px;margin-top:18px}
.panelBtns .btn{flex:1;text-align:center;padding:11px}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s}
.swatch:hover{transform:scale(1.12)}
.swatch.active{border-color:#fff}
#colourGroup{display:flex;align-items:center;gap:8px;padding:4px 10px;margin-bottom:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:22px}
.autochip{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.9);height:30px;padding:0 12px;border-radius:15px;font-size:13px;cursor:pointer;
  transition:all 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;
  display:flex;align-items:center;justify-content:center;gap:4px;flex:none;white-space:nowrap}
.autochip:hover{background:rgba(255,255,255,0.22)}
.autochip.active{background:rgba(255,255,255,0.22);border-color:#fff}
#barSwatches{display:flex;gap:6px;align-items:center}
#barSwatches .swatch{width:24px;height:24px;border:2px solid rgba(255,255,255,0.25)}
#barSwatches .swatch.active{border-color:#fff;transform:scale(1.1)}
.picker{position:relative;width:24px;height:24px;border-radius:50%;overflow:hidden;
  border:2px solid rgba(255,255,255,0.25);cursor:pointer;
  background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)}
.picker.active{border-color:#fff}
.picker input{position:absolute;inset:-4px;width:200%;height:200%;opacity:0;cursor:pointer;border:none;padding:0}
.bgrow{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.bgsw{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:transform 0.15s}
.bgsw:hover{transform:scale(1.1)}
.bgsw.active{border-color:#fff}
.note{font-size:12px;color:rgba(255,255,255,0.4);margin:4px 0 8px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 14px}
.chip{padding:7px 13px;border-radius:16px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.85);font-size:12px;cursor:pointer;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.15s}
.chip:hover{background:rgba(255,255,255,0.16)}
.chip.active{background:rgba(255,255,255,0.24);border-color:#fff;color:#fff}
#tabs{display:flex;gap:8px;margin:2px 0 16px}
.tab{flex:1;padding:11px;border-radius:12px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.65);font-size:14px;cursor:pointer;
  font-family:sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.15s}
.tab.active{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.6);color:#fff}
.pane{display:none}
.pane.active{display:block}
.themeRow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
/* ===== FRAMEWORK-CSS END ===== */
</style>
</head>
<body>
<!-- ===== FRAMEWORK-HTML START (synced — do not edit per file) ===== -->
<canvas id="c"></canvas>

<div id="ui">
  <button class="btn" id="collapse" title="Menu">≡</button>
  <button class="btn cat" data-pane="appearance">✨ Appearance</button>
  <button class="btn cat" data-pane="sound">🔊 Sound</button>
</div>

<div id="panel">
  <div class="pane active" id="paneAppearance">
    <div class="sectn">Theme</div>
    <div class="themeRow" id="themeRow"></div>
    <div class="sectn">Colour</div>
    <div id="colourGroup">
      <button id="autoBtn" class="autochip" title="Cycle through palette colours">↻ Auto</button>
      <div id="barSwatches" title="Tap a colour to lock it"></div>
    </div>
    <div id="appSliders"></div>
    <div class="sectn">Background</div>
    <div class="bgrow" id="bgRow"></div>
  </div>

  <div class="pane" id="paneSound">
    <div id="soundControls"></div>
  </div>

  <div class="panelBtns">
    <button class="btn" id="clearBtn">🧹 Clear canvas</button>
    <button class="btn" id="resetBtn">↺ Reset settings</button>
  </div>
</div>
<!-- ===== FRAMEWORK-HTML END ===== -->

<script>
'use strict';
/* ===== FRAMEWORK-JS START (synced by sync-framework.js — do not edit per file) =====
   Shared scaffolding for every animation: settings + persistence, colour system,
   audio engine, 5-touch input, the settings panel, and the lifecycle/render loop.
   The animation supplies an `Anim` object (see ANIMATION block below) with:
     themes, defaults, schema, sectionLabel, init(canvas), resize(w,h),
     splat(x,y,dx,dy,color,opts), frame(dt), reset()
   Coordinates passed to splat() are normalised 0..1 with y pointing UP.
*/

const canvas   = document.getElementById('c');
const ui       = document.getElementById('ui');
const panel    = document.getElementById('panel');
const themeRow = document.getElementById('themeRow');
const barSwatches = document.getElementById('barSwatches');
const autoBtn  = document.getElementById('autoBtn');

const STORE_KEY = 'settings:' + location.pathname.split('/').pop();

// Settings shared by every animation (the animation adds its own via Anim.defaults)
const SHARED_DEFAULTS = {
  volume:0.30, bg:'#000000', lockedColor:null,
  voice:'pure', scale:'penta', reverb:false, echo:false, chorus:false, mute:false,
};

let SETTINGS = {}, currentTheme = '', colorIdx = 0;
let bgRGB = [0,0,0];

function initSettings(){
  SETTINGS = Object.assign({}, SHARED_DEFAULTS, Anim.defaults||{});
  try { SETTINGS = Object.assign(SETTINGS, JSON.parse(localStorage.getItem(STORE_KEY)||'{}')); } catch(e){}
  const themeKeys = Object.keys(Anim.themes);
  currentTheme = themeKeys.includes(SETTINGS.theme) ? SETTINGS.theme : themeKeys[0];
  bgRGB = hexToRGB(SETTINGS.bg);
}
function saveSettings(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(SETTINGS)); }catch(e){} }

function hexToRGB(h){
  h=h.replace('#','');
  return [parseInt(h.substr(0,2),16)/255, parseInt(h.substr(2,2),16)/255, parseInt(h.substr(4,2),16)/255];
}
function applyBg(){ bgRGB = hexToRGB(SETTINGS.bg); }

// ── Colour ────────────────────────────────────────────────────────────────────
const VIVID = 1.25;
function pickColor(){
  let c;
  if (SETTINGS.lockedColor) c = SETTINGS.lockedColor;
  else { const cols = Anim.themes[currentTheme].colors; c = cols[colorIdx++ % cols.length]; }
  return [c[0]*VIVID, c[1]*VIVID, c[2]*VIVID];
}

// ── Audio engine ───────────────────────────────────────────────────────────────
let audioCtx=null, masterGain=null, convolver=null, reverbWet=null, echoWet=null, chorusWet=null, limiter=null;

const VOICES = {
  pure:  {label:'Pure',  oct:0,  gain:0.12, filter:{type:'lowpass', base:1300, track:1600}, lfo:{rate:5,depth:0.007},
    oscs:[{type:'sine'}]},
  warm:  {label:'Warm',  oct:0,  gain:0.13, filter:{type:'lowpass', base:780,  track:1100}, lfo:{rate:4,depth:0.005},
    oscs:[{type:'triangle'},{type:'sine',detune:7,gain:0.6},{type:'sine',detune:-7,gain:0.6}]},
  bell:  {label:'Bell',  oct:0,  gain:0.12, filter:{type:'lowpass', base:4500, track:2000}, lfo:{rate:0,depth:0},
    oscs:[{type:'sine'},{type:'sine',ratio:2.76,gain:0.5,decayTo:0.04},{type:'sine',ratio:5.4,gain:0.25,decayTo:0.02}]},
  glass: {label:'Glass', oct:0,  gain:0.13, filter:{type:'highpass',base:350,  track:250},  lfo:{rate:7,depth:0.012},
    oscs:[{type:'sine'},{type:'sine',ratio:3.0,gain:0.45,decayTo:0.35},{type:'sine',ratio:4.2,gain:0.22,decayTo:0.25}]},
  deep:  {label:'Deep',  oct:-1, gain:0.18, filter:{type:'lowpass', base:700,  track:900},  lfo:{rate:2,depth:0.005},
    oscs:[{type:'sine'},{type:'sine',ratio:2,gain:0.55},{type:'sine',ratio:3,gain:0.2}]},
  pluck: {label:'Pluck', oct:0,  gain:0.18, filter:{type:'lowpass', base:1800, track:1600}, lfo:{rate:0,depth:0}, pluck:1.6,
    oscs:[{type:'triangle'},{type:'sine',ratio:2,gain:0.3}]},
  synth: {label:'Synth', oct:0,  gain:0.10, filter:{type:'lowpass', base:600,  track:2800, q:7}, lfo:{rate:0,depth:0},
    oscs:[{type:'sawtooth'},{type:'sawtooth',detune:11,gain:0.7},{type:'sawtooth',detune:-11,gain:0.7}]},
  retro: {label:'Retro', oct:0,  gain:0.09, filter:{type:'lowpass', base:2600, track:1400}, lfo:{rate:6,depth:0.004},
    oscs:[{type:'square'}]},
  pad:   {label:'Pad',   oct:-1, gain:0.11, filter:{type:'lowpass', base:500,  track:1400, q:2}, lfo:{rate:3,depth:0.006},
    oscs:[{type:'sawtooth',detune:6,gain:0.6},{type:'sawtooth',detune:-6,gain:0.6},{type:'sine',ratio:2,gain:0.3}]},
};
const SCALES = {
  penta: {label:'Pentatonic', steps:[0,2,4,7,9]},
  major: {label:'Major',      steps:[0,2,4,5,7,9,11]},
  minor: {label:'Minor',      steps:[0,2,3,5,7,8,10]},
  whole: {label:'Whole-tone', steps:[0,2,4,6,8,10]},
};
let FREQS=[];
function buildScale(){
  const base=130.81, steps=(SCALES[SETTINGS.scale]||SCALES.penta).steps, arr=[];
  for(let oct=0;oct<3;oct++) for(const s of steps) arr.push(base*Math.pow(2,(s+12*oct)/12));
  FREQS=arr;
}
function freqForX(x){ const i=Math.max(0,Math.min(FREQS.length-1,Math.floor(x*FREQS.length))); return FREQS[i]||110; }

function makeImpulse(ac,dur,decay){
  const len=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(2,len,ac.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}
function getAudio(){
  if(!audioCtx){
    const ac=audioCtx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    masterGain=ac.createGain(); masterGain.gain.value=SETTINGS.mute?0:SETTINGS.volume;
    // Chorus
    const chDelay=ac.createDelay(); chDelay.delayTime.value=0.026;
    const chLfo=ac.createOscillator(); chLfo.frequency.value=0.6;
    const chDepth=ac.createGain(); chDepth.gain.value=0.004;
    chLfo.connect(chDepth); chDepth.connect(chDelay.delayTime); chLfo.start();
    chorusWet=ac.createGain(); chorusWet.gain.value=SETTINGS.chorus?0.6:0;
    const busA=ac.createGain();
    masterGain.connect(busA);
    masterGain.connect(chDelay); chDelay.connect(chorusWet); chorusWet.connect(busA);
    // Echo
    const ecDelay=ac.createDelay(); ecDelay.delayTime.value=0.33;
    const ecFb=ac.createGain(); ecFb.gain.value=0.42;
    ecDelay.connect(ecFb); ecFb.connect(ecDelay);
    echoWet=ac.createGain(); echoWet.gain.value=SETTINGS.echo?0.5:0;
    const busB=ac.createGain();
    busA.connect(busB);
    busA.connect(ecDelay); ecDelay.connect(echoWet); echoWet.connect(busB);
    // Limiter
    limiter=ac.createDynamicsCompressor();
    limiter.threshold.value=-3; limiter.knee.value=0; limiter.ratio.value=20;
    limiter.attack.value=0.003; limiter.release.value=0.25;
    limiter.connect(ac.destination);
    // Reverb
    convolver=ac.createConvolver(); convolver.buffer=makeImpulse(ac,3.8,2.0);
    reverbWet=ac.createGain(); reverbWet.gain.value=SETTINGS.reverb?0.9:0;
    busB.connect(limiter);
    busB.connect(convolver); convolver.connect(reverbWet); reverbWet.connect(limiter);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function applyVolume(){ if(masterGain) masterGain.gain.setTargetAtTime(SETTINGS.mute?0:SETTINGS.volume, audioCtx.currentTime, 0.05); }
function applyReverb(){ if(reverbWet) reverbWet.gain.setTargetAtTime(SETTINGS.reverb?0.9:0, audioCtx.currentTime, 0.1); }
function applyEcho(){   if(echoWet)   echoWet.gain.setTargetAtTime(SETTINGS.echo?0.5:0,     audioCtx.currentTime, 0.1); }
function applyChorus(){ if(chorusWet) chorusWet.gain.setTargetAtTime(SETTINGS.chorus?0.6:0, audioCtx.currentTime, 0.1); }

let voiceSeq=0; const voices={}; const MAX_VOICES=16;
function startVoice(x,y){
  try{
    if(Object.keys(voices).length>=MAX_VOICES) return 0;
    const ac=getAudio(), vid=++voiceSeq, V=VOICES[SETTINGS.voice]||VOICES.pure;
    const freq=freqForX(x)*Math.pow(2,V.oct), t=ac.currentTime;
    const gain=ac.createGain();
    const pan=ac.createStereoPanner(); pan.pan.value=(x*2-1)*0.6;
    const filt=ac.createBiquadFilter(); filt.type=V.filter.type; filt.frequency.value=V.filter.base+y*V.filter.track;
    if(V.filter.q) filt.Q.value=V.filter.q;
    filt.connect(gain); gain.connect(pan); pan.connect(masterGain);
    const nodes=[];
    for(const o of V.oscs){
      const ratio=o.ratio||1;
      const osc=ac.createOscillator(); osc.type=o.type||'sine'; osc.frequency.value=freq*ratio;
      if(o.detune) osc.detune.value=o.detune;
      const g=ac.createGain(); g.gain.setValueAtTime(o.gain!==undefined?o.gain:1, t);
      if(o.decayTo!==undefined) g.gain.setTargetAtTime((o.gain!==undefined?o.gain:1)*o.decayTo, t, 0.5);
      osc.connect(g); g.connect(filt); osc.start();
      nodes.push({osc,ratio});
    }
    let lfo=null;
    if(V.lfo.rate>0){
      lfo=ac.createOscillator(); const lfoG=ac.createGain();
      lfo.frequency.value=V.lfo.rate; lfoG.gain.value=freq*V.lfo.depth;
      lfo.connect(lfoG); nodes.forEach(n=>lfoG.connect(n.osc.frequency)); lfo.start();
    }
    gain.gain.setValueAtTime(0.0001,t);
    gain.gain.linearRampToValueAtTime(V.gain,t+0.02);
    if(V.pluck) gain.gain.exponentialRampToValueAtTime(0.0008, t+0.02+V.pluck);
    voices[vid]={nodes,lfo,gain,pan,filt,freq,V};
    return vid;
  }catch(e){ return 0; }
}
function moveVoice(vid,x,y,speed){
  const v=voices[vid]; if(!v) return;
  try{
    const now=getAudio().currentTime, V=v.V;
    v.freq=freqForX(x)*Math.pow(2,V.oct);
    v.nodes.forEach(n=>n.osc.frequency.setTargetAtTime(v.freq*n.ratio,now,0.06));
    v.pan.pan.setTargetAtTime((x*2-1)*0.6,now,0.08);
    v.filt.frequency.setTargetAtTime(V.filter.base+y*V.filter.track,now,0.08);
  }catch(e){}
}
function stopVoice(vid){
  const v=voices[vid]; if(!v) return;
  delete voices[vid];
  try{
    const ac=getAudio(), t=ac.currentTime;
    v.gain.gain.cancelScheduledValues(t);
    v.gain.gain.setValueAtTime(v.gain.gain.value,t);
    v.gain.gain.setTargetAtTime(0,t,0.25);
    const stopAt=t+1.2;
    v.nodes.forEach(n=>{try{n.osc.stop(stopAt);}catch(e){}});
    if(v.lfo){try{v.lfo.stop(stopAt);}catch(e){}}
    v.nodes[0].osc.onended=()=>{try{v.gain.disconnect();v.pan.disconnect();v.filt.disconnect();}catch(e){}};
  }catch(e){}
}

// ── Input (up to 5 independent touches + mouse fallback) ───────────────────────
class Pointer {
  constructor(id){ this.id=id; this.x=0; this.y=0; this.px=0; this.py=0;
    this.dx=0; this.dy=0; this.down=false; this.moved=false; this.color=[1,1,1]; this.voice=0; }
}
const pointers = [];
function getPointer(id){ let p=pointers.find(p=>p.id===id); if(!p){p=new Pointer(id); pointers.push(p);} return p; }
function toSim(x,y){ return { x: x/canvas.clientWidth, y: 1-y/canvas.clientHeight }; }

function onDown(id, cx, cy){
  const p=getPointer(id), s=toSim(cx,cy);
  p.x=s.x; p.y=s.y; p.px=s.x; p.py=s.y; p.dx=0; p.dy=0;
  p.down=true; p.moved=false; p.color=pickColor();
  if(p.voice) stopVoice(p.voice);
  p.voice=startVoice(s.x,s.y);
}
function onMove(id, cx, cy){
  const p=pointers.find(p=>p.id===id);
  if(!p || !p.down) return;
  const s=toSim(cx,cy);
  p.dx=s.x-p.x; p.dy=s.y-p.y; p.x=s.x; p.y=s.y;
  moveVoice(p.voice, s.x, s.y, Math.hypot(p.dx,p.dy));
}
function onUp(id){
  const i=pointers.findIndex(p=>p.id===id); if(i<0) return;
  const p=pointers[i]; p.down=false; stopVoice(p.voice); p.voice=0;
  pointers.splice(i,1);
}
canvas.addEventListener('mousedown',e=>{ onDown('mouse',e.offsetX,e.offsetY); });
canvas.addEventListener('mousemove',e=>{ onMove('mouse',e.offsetX,e.offsetY); });
window.addEventListener('mouseup',()=>{ onUp('mouse'); });
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect();
  for(const t of e.changedTouches) onDown(t.identifier,t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect();
  for(const t of e.changedTouches) onMove(t.identifier,t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchend',e=>{ for(const t of e.changedTouches) onUp(t.identifier); },{passive:false});
canvas.addEventListener('touchcancel',e=>{ for(const t of e.changedTouches) onUp(t.identifier); },{passive:false});

// ── Settings panel UI ──────────────────────────────────────────────────────────
function rgbCss(c){ return `rgb(${Math.round(Math.min(c[0],1)*255)},${Math.round(Math.min(c[1],1)*255)},${Math.round(Math.min(c[2],1)*255)})`; }

function setTheme(name){
  currentTheme=name; SETTINGS.theme=name; saveSettings();
  themeRow.querySelectorAll('.btn').forEach(x=>x.classList.toggle('active',x.dataset.theme===name));
  buildSwatches();
}
function buildThemeButtons(){
  themeRow.innerHTML='';
  for(const k in Anim.themes){
    const b=document.createElement('button'); b.className='btn'+(k===currentTheme?' active':'');

let glLost=false, lastTime=Date.now();
function sizeCanvas(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=Math.round(canvas.clientWidth*dpr), h=Math.round(canvas.clientHeight*dpr);
  if(canvas.width!==w || canvas.height!==h){ canvas.width=w; canvas.height=h; if(Anim.resize) Anim.resize(w,h); }
}
function setupGL(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.round(canvas.clientWidth*dpr)||canvas.width;
  canvas.height=Math.round(canvas.clientHeight*dpr)||canvas.height;
  if(Anim.init) Anim.init(canvas);
  if(Anim.resize) Anim.resize(canvas.width,canvas.height);
}
function loop(){
  if(glLost){ requestAnimationFrame(loop); return; }
  sizeCanvas();
  const now=Date.now(), dt=Math.min((now-lastTime)/1000,0.016); lastTime=now;
  for(const p of pointers){
    if(p.down){
      const mdx=p.x-p.px, mdy=p.y-p.py, dist=Math.hypot(mdx,mdy);
      if(!p.moved){ Anim.splat(p.x,p.y,0,0,p.color,{velScale:0}); p.moved=true; }
      else if(dist>0.00001){
        const steps=Math.min(Math.max(1,Math.ceil(dist/0.012)),10);
        for(let i=1;i<=steps;i++){ const t=i/steps; Anim.splat(p.px+mdx*t,p.py+mdy*t,p.dx,p.dy,p.color,{velScale:1/steps}); }
      }
      p.px=p.x; p.py=p.y; p.dx*=0.85; p.dy*=0.85;
    }
  }
  Anim.frame(dt);
  requestAnimationFrame(loop);
}
function boot(){
  initSettings();
  buildScale();
  buildThemeButtons();
  buildPanel();
  setTheme(currentTheme);
  applyBg();
  setupGL();
  canvas.addEventListener('webglcontextlost', e=>{ e.preventDefault(); glLost=true; }, false);
  canvas.addEventListener('webglcontextrestored', ()=>{ glLost=false; setupGL(); }, false);
  loop();
}

/* ===== ANIMATION START =====
   Fluid — real-time Navier–Stokes dye on the GPU (WebGL2 ping-pong framebuffers).
   Touch injects velocity + coloured dye; the field swirls, mixes and dissipates.
*/
const Anim = (function(){
  let gl=null, isWebGL2=false, halfFloat, supportLinearFiltering;
  let HALF, RGBA16F, RGBA, LINEAR;
  let prog, quadBuf;
  let simW, simH, dyeW, dyeH, velocity, dye, pressure, divergence, curl2;
  const SIM_RES=256, DYE_RES=1280;
  const params={ alpha:false, depth:false, stencil:false, antialias:false, preserveDrawingBuffer:false };

  function dyeDissipation(){ return (1.0 - SETTINGS.persistence) * 2.0; }

  function acquireExt(){
    if(isWebGL2){ gl.getExtension('EXT_color_buffer_float'); supportLinearFiltering=gl.getExtension('OES_texture_float_linear'); }
    else { halfFloat=gl.getExtension('OES_texture_half_float'); supportLinearFiltering=gl.getExtension('OES_texture_half_float_linear'); }
  }
  function setFormats(){
    HALF = isWebGL2 ? gl.HALF_FLOAT : (halfFloat ? halfFloat.HALF_FLOAT_OES : gl.UNSIGNED_BYTE);
    RGBA16F = isWebGL2 ? gl.RGBA16F : gl.RGBA;
    RGBA = gl.RGBA;
    LINEAR = supportLinearFiltering ? gl.LINEAR : gl.NEAREST;
  }

  const V_BASE=`precision highp float;attribute vec2 aPos;varying vec2 vUv,vL,vR,vT,vB;uniform vec2 texelSize;
    void main(){vUv=aPos*0.5+0.5;vL=vUv-vec2(texelSize.x,0.);vR=vUv+vec2(texelSize.x,0.);vT=vUv+vec2(0.,texelSize.y);vB=vUv-vec2(0.,texelSize.y);gl_Position=vec4(aPos,0,1);}`;
  const V_SIMPLE=`precision highp float;attribute vec2 aPos;varying vec2 vUv;void main(){vUv=aPos*0.5+0.5;gl_Position=vec4(aPos,0,1);}`;
  const F_COPY=`precision mediump float;varying vec2 vUv;uniform sampler2D uTex;void main(){gl_FragColor=texture2D(uTex,vUv);}`;
  const F_CLEAR=`precision mediump float;varying vec2 vUv;uniform sampler2D uTex;uniform float value;void main(){gl_FragColor=value*texture2D(uTex,vUv);}`;
  const F_SPLAT=`precision highp float;varying vec2 vUv;uniform sampler2D uTarget;uniform float aspectRatio;uniform vec3 color;uniform vec2 point;uniform float radius;uniform float mixMode;
    void main(){vec2 p=vUv-point;p.x*=aspectRatio;float s=exp(-dot(p,p)/radius);vec3 base=texture2D(uTarget,vUv).xyz;vec3 additive=base+s*color;vec3 blended=mix(base,color,clamp(s,0.0,1.0));gl_FragColor=vec4(mix(additive,blended,mixMode),1.0);}`;
  const F_ADVECT=`precision highp float;varying vec2 vUv;uniform sampler2D uVelocity;uniform sampler2D uSource;uniform vec2 texelSize;uniform float dt;uniform float dissipation;
    void main(){vec2 coord=vUv-dt*texture2D(uVelocity,vUv).xy*texelSize;gl_FragColor=texture2D(uSource,coord)/(1.0+dissipation*dt);}`;
  const F_DIVERGENCE=`precision mediump float;varying vec2 vL,vR,vT,vB;uniform sampler2D uVelocity;
    void main(){float L=texture2D(uVelocity,vL).x,R=texture2D(uVelocity,vR).x,T=texture2D(uVelocity,vT).y,B=texture2D(uVelocity,vB).y;gl_FragColor=vec4(0.5*(R-L+T-B),0,0,1);}`;
  const F_CURL=`precision mediump float;varying vec2 vL,vR,vT,vB;uniform sampler2D uVelocity;
    void main(){float L=texture2D(uVelocity,vL).y,R=texture2D(uVelocity,vR).y,T=texture2D(uVelocity,vT).x,B=texture2D(uVelocity,vB).x;gl_FragColor=vec4(0.5*(R-L-(T-B)),0,0,1);}`;
  const F_VORTICITY=`precision highp float;varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVelocity;uniform sampler2D uCurl;uniform float curl;uniform float dt;
    void main(){float L=texture2D(uCurl,vL).x,R=texture2D(uCurl,vR).x,T=texture2D(uCurl,vT).x,B=texture2D(uCurl,vB).x,C=texture2D(uCurl,vUv).x;vec2 force=0.5*vec2(abs(T)-abs(B),abs(R)-abs(L));force/=max(length(force),0.0001);force*=curl*C;vec2 v=texture2D(uVelocity,vUv).xy;gl_FragColor=vec4(v+force*dt,0,1);}`;
  const F_PRESSURE=`precision mediump float;varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uPressure;uniform sampler2D uDivergence;
    void main(){float L=texture2D(uPressure,vL).x,R=texture2D(uPressure,vR).x,T=texture2D(uPressure,vT).x,B=texture2D(uPressure,vB).x,div=texture2D(uDivergence,vUv).x;gl_FragColor=vec4((L+R+T+B-div)*0.25,0,0,1);}`;
  const F_GRADIENT=`precision mediump float;varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uPressure;uniform sampler2D uVelocity;
    void main(){float L=texture2D(uPressure,vL).x,R=texture2D(uPressure,vR).x,T=texture2D(uPressure,vT).x,B=texture2D(uPressure,vB).x;vec2 v=texture2D(uVelocity,vUv).xy;v-=vec2(R-L,T-B)*0.5;gl_FragColor=vec4(v,0,1);}`;
  const F_DISPLAY=`precision highp float;varying vec2 vUv;uniform sampler2D uDye;
    void main(){vec3 c=texture2D(uDye,vUv).rgb;float peak=max(c.r,max(c.g,c.b));if(peak>1.0)c/=peak;gl_FragColor=vec4(c,max(c.r,max(c.g,c.b)));}`;

  function compile(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
  function program(vert,frag){
    const p=gl.createProgram();
    gl.attachShader(p,compile(gl.VERTEX_SHADER,vert)); gl.attachShader(p,compile(gl.FRAGMENT_SHADER,frag)); gl.linkProgram(p);
    const uniforms={}, n=gl.getProgramParameter(p,gl.ACTIVE_UNIFORMS);
    for(let i=0;i<n;i++){const u=gl.getActiveUniform(p,i); uniforms[u.name]=gl.getUniformLocation(p,u.name);}
    return {prog:p,uniforms};
  }
  function buildPrograms(){
    prog={ copy:program(V_SIMPLE,F_COPY), clear:program(V_SIMPLE,F_CLEAR), splat:program(V_SIMPLE,F_SPLAT),
      advect:program(V_SIMPLE,F_ADVECT), divergence:program(V_BASE,F_DIVERGENCE), curl:program(V_BASE,F_CURL),
      vorticity:program(V_BASE,F_VORTICITY), pressure:program(V_BASE,F_PRESSURE), gradient:program(V_BASE,F_GRADIENT),
      display:program(V_SIMPLE,F_DISPLAY) };
  }
  function buildQuad(){
    quadBuf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  }
  function bindQuad(p){ gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf); const loc=gl.getAttribLocation(p.prog,'aPos'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0); }

  function createFBO(w,h,iF,f,t,filter){

    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,filter); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,filter);

    return { tex,fbo,w,h, attach(id){ gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D,tex); return id; } };
  }
  function createDoubleFBO(w,h,iF,f,t,filter){
    let r=createFBO(w,h,iF,f,t,filter), w2=createFBO(w,h,iF,f,t,filter);
    return { get read(){return r;}, get write(){return w2;}, swap(){ [r,w2]=[w2,r]; } };

  function initFBOs(){

    simW=s.w; simH=s.h; dyeW=d.w; dyeH=d.h;
    velocity=createDoubleFBO(simW,simH,RGBA16F,RGBA,HALF,LINEAR);
    dye=createDoubleFBO(dyeW,dyeH,RGBA16F,RGBA,HALF,LINEAR);
    pressure=createDoubleFBO(simW,simH,RGBA16F,RGBA,HALF,gl.NEAREST);
    divergence=createFBO(simW,simH,RGBA16F,RGBA,HALF,gl.NEAREST);
    curl2=createFBO(simW,simH,RGBA16F,RGBA,HALF,gl.NEAREST);
  }
  function blit(target){

    else { gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,canvas.width,canvas.height); }
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  function clearDye(){
    for(const fb of [dye.read,dye.write]){ gl.bindFramebuffer(gl.FRAMEBUFFER,fb.fbo); gl.viewport(0,0,fb.w,fb.h); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); }
  }

  function step(dt){
    gl.disable(gl.BLEND);
    {const p=prog.curl; gl.useProgram(p.prog); bindQuad(p); gl.uniform2f(p.uniforms.texelSize,1/simW,1/simH); gl.uniform1i(p.uniforms.uVelocity,velocity.read.attach(0)); blit(curl2);}
    {const p=prog.vorticity; gl.useProgram(p.prog); bindQuad(p); gl.uniform2f(p.uniforms.texelSize,1/simW,1/simH); gl.uniform1i(p.uniforms.uVelocity,velocity.read.attach(0)); gl.uniform1i(p.uniforms.uCurl,curl2.attach(1)); gl.uniform1f(p.uniforms.curl,SETTINGS.curl); gl.uniform1f(p.uniforms.dt,dt); blit(velocity.write); velocity.swap();}
    {const p=prog.divergence; gl.useProgram(p.prog); bindQuad(p); gl.uniform2f(p.uniforms.texelSize,1/simW,1/simH); gl.uniform1i(p.uniforms.uVelocity,velocity.read.attach(0)); blit(divergence);}
    {const p=prog.clear; gl.useProgram(p.prog); bindQuad(p); gl.uniform1i(p.uniforms.uTex,pressure.read.attach(0)); gl.uniform1f(p.uniforms.value,0.85); blit(pressure.write); pressure.swap();}
    for(let i=0;i<SETTINGS.pressureIter;i++){ const p=prog.pressure; gl.useProgram(p.prog); bindQuad(p); gl.uniform2f(p.uniforms.texelSize,1/simW,1/simH); gl.uniform1i(p.uniforms.uPressure,pressure.read.attach(0)); gl.uniform1i(p.uniforms.uDivergence,divergence.attach(1)); blit(pressure.write); pressure.swap(); }
    {const p=prog.gradient; gl.useProgram(p.prog); bindQuad(p); gl.uniform2f(p.uniforms.texelSize,1/simW,1/simH); gl.uniform1i(p.uniforms.uPressure,pressure.read.attach(0)); gl.uniform1i(p.uniforms.uVelocity,velocity.read.attach(1)); blit(velocity.write); velocity.swap();}
    {const p=prog.advect; gl.useProgram(p.prog); bindQuad(p); gl.uniform2f(p.uniforms.texelSize,1/simW,1/simH); gl.uniform1i(p.uniforms.uVelocity,velocity.read.attach(0)); gl.uniform1i(p.uniforms.uSource,velocity.read.attach(0)); gl.uniform1f(p.uniforms.dt,dt); gl.uniform1f(p.uniforms.dissipation,SETTINGS.velFade); blit(velocity.write); velocity.swap();}
    {const p=prog.advect; gl.useProgram(p.prog); bindQuad(p); gl.uniform2f(p.uniforms.texelSize,1/dyeW,1/dyeH); gl.uniform1i(p.uniforms.uVelocity,velocity.read.attach(0)); gl.uniform1i(p.uniforms.uSource,dye.read.attach(1)); gl.uniform1f(p.uniforms.dt,dt); gl.uniform1f(p.uniforms.dissipation,dyeDissipation()); blit(dye.write); dye.swap();}
  }

  function display(){
    const p=prog.display; gl.useProgram(p.prog); bindQuad(p);
    gl.enable(gl.BLEND); gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
    gl.uniform1i(p.uniforms.uDye,dye.read.attach(0)); blit(null);
  }

  return {
    sectionLabel:'Brush & Flow',
    themes:{
      cosmic:{label:'✦ Cosmic', colors:[[0.6,0.1,1],[0.1,0.4,1],[1,0.1,0.6],[0.1,1,0.8],[1,0.8,0.1]]},
      lava:  {label:'🔥 Lava',  colors:[[1,0.15,0],[1,0.5,0],[1,0.9,0.1],[0.8,0,0.1],[1,0.3,0.05]]},
      ocean: {label:'🌊 Ocean', colors:[[0,0.6,1],[0,1,0.8],[0.1,0.3,0.9],[0,0.8,0.6],[0.4,0.9,1]]},
      aurora:{label:'🌌 Aurora',colors:[[0.1,1,0.5],[0.5,0.1,1],[0,0.9,0.7],[0.8,0.2,1],[0.1,0.8,0.4]]},
      neon:  {label:'⚡ Neon',  colors:[[1,0,0.8],[0,1,0.2],[1,0.9,0],[0,0.8,1],[1,0.1,0.5]]},
    },
    defaults:{ theme:'cosmic', brushSize:0.12, intensity:7000, persistence:0.55, velFade:0.20, curl:0, pressureIter:22 },
    schema:[
      {key:'brushSize',  label:'Brush size',        min:0.02, max:0.30,  step:0.01, dp:2},
      {key:'intensity',  label:'Flow force',        min:1000, max:15000, step:100,  dp:0},
      {key:'persistence',label:'Trail persistence', min:0,    max:1,     step:0.01, dp:2},
    ],
    init(cv){
      if(!gl){
        gl=cv.getContext('webgl2',params); isWebGL2=!!gl;
        if(!gl) gl=cv.getContext('webgl',params)||cv.getContext('experimental-webgl',params);
      }
      acquireExt(); setFormats(); buildPrograms(); buildQuad(); initFBOs();
    },
    resize(w,h){ if(gl){ const d=getRes(DYE_RES); if(d.w!==dyeW||d.h!==dyeH) initFBOs(); } },
    splat(x,y,dx,dy,color,opts){
      opts=opts||{};
      const velScale=opts.velScale!==undefined?opts.velScale:1;
      const colScale=opts.colScale!==undefined?opts.colScale:1;
      const radius=(opts.radius!==undefined?opts.radius:SETTINGS.brushSize)/100;
      const p=prog.splat; gl.useProgram(p.prog); bindQuad(p);
      const ar=canvas.width/canvas.height, force=SETTINGS.intensity*velScale;
      gl.uniform1i(p.uniforms.uTarget,velocity.read.attach(0));
      gl.uniform1f(p.uniforms.aspectRatio,ar);
      gl.uniform2f(p.uniforms.point,x,y);
      gl.uniform3f(p.uniforms.color,dx*force,dy*force,0);
      gl.uniform1f(p.uniforms.radius,radius);
      gl.uniform1f(p.uniforms.mixMode,0);
      blit(velocity.write); velocity.swap();
      gl.uniform1i(p.uniforms.uTarget,dye.read.attach(0));
      gl.uniform3f(p.uniforms.color,color[0]*colScale,color[1]*colScale,color[2]*colScale);
      gl.uniform1f(p.uniforms.mixMode,1);
      blit(dye.write); dye.swap();
    },
    frame(dt){
      step(dt);
      gl.bindFramebuffer(gl.FRAMEBUFFER,null);
      gl.viewport(0,0,canvas.width,canvas.height);
      gl.clearColor(bgRGB[0],bgRGB[1],bgRGB[2],1); gl.clear(gl.COLOR_BUFFER_BIT);
      display();
    },
    reset(){ if(gl) clearDye(); },
  };
})();
/* ===== ANIMATION END ===== */

boot();
</script>

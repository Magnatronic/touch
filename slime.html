  background:rgba(0,0,0,0.45);padding:6px 9px;border-radius:8px;pointer-events:none;white-space:pre}

<script>
'use strict';
/* ===== FRAMEWORK-JS START (synced by sync-framework.js — do not edit per file) =====
   Shared scaffolding for every animation: settings + persistence, colour system,
   audio engine, 5-touch input, the settings panel, and the lifecycle/render loop.
   The animation supplies an `Anim` object (see ANIMATION block below) with:
     themes, defaults, schema, sectionLabel, init(canvas), resize(w,h),
     splat(x,y,dx,dy,color,opts), frame(dt), reset()
   Coordinates passed to splat() are normalised 0..1 with y pointing UP.
*/

const canvas   = document.getElementById('c');
const ui       = document.getElementById('ui');
const panel    = document.getElementById('panel');
const quickRow = document.getElementById('quickRow');

const STORE_KEY = 'settings:' + location.pathname.split('/').pop();

// Settings shared by every animation (the animation adds its own via Anim.defaults)
const SHARED_DEFAULTS = {
  volume:0.30, bg:'#000000', lockedColor:null,
  voice:'pure', scale:'penta', reverb:false, echo:false, chorus:false, mute:false,
  quality:'auto', showStats:false,
};

let SETTINGS = {}, currentTheme = '', colorIdx = 0;
let bgRGB = [0,0,0];
let currentQuickMode = null;

function initSettings(){
  SETTINGS = Object.assign({}, SHARED_DEFAULTS, Anim.defaults||{});
  try { SETTINGS = Object.assign(SETTINGS, JSON.parse(localStorage.getItem(STORE_KEY)||'{}')); } catch(e){}
  const themeKeys = Object.keys(Anim.themes);
  currentTheme = themeKeys.includes(SETTINGS.theme) ? SETTINGS.theme : themeKeys[0];
  bgRGB = hexToRGB(SETTINGS.bg);
  perfLevel = (SETTINGS.quality && SETTINGS.quality!=='auto') ? SETTINGS.quality : 'high';
}

// ── Performance / quality (auto-scaling + manual override) ──────────────────────
const QUALITY = { auto:{label:'Auto'}, high:{label:'High'}, med:{label:'Medium'}, low:{label:'Low'} };
const PERF_ORDER = ['low','med','high'];
let perfLevel = 'high', qCooldown = 0;
function activeQuality(){ return perfLevel; }
function setPerf(level){ if(level===perfLevel) return; perfLevel=level; if(Anim.setQuality) Anim.setQuality(level); }
function autoPerf(fps){
  if(qCooldown>0){ qCooldown--; return; }
  const i=PERF_ORDER.indexOf(perfLevel);
  if(fps<42 && i>0){ setPerf(PERF_ORDER[i-1]); qCooldown=4; }
  else if(fps>56 && i<2){ setPerf(PERF_ORDER[i+1]); qCooldown=8; }
}
function updateStats(fps){
  const el=document.getElementById('stats'); if(!el) return;
  const touches=pointers.filter(p=>p.down).length;
  el.textContent = Math.round(fps)+' fps   quality: '+perfLevel+(SETTINGS.quality==='auto'?' (auto)':'')+'   touches: '+touches;
}
function applyStats(){ const el=document.getElementById('stats'); if(el) el.style.display = SETTINGS.showStats?'block':'none'; }
function saveSettings(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(SETTINGS)); }catch(e){} }

function hexToRGB(h){
  h=h.replace('#','');
  return [parseInt(h.substr(0,2),16)/255, parseInt(h.substr(2,2),16)/255, parseInt(h.substr(4,2),16)/255];
}
function applyBg(){ bgRGB = hexToRGB(SETTINGS.bg); }

// ── Colour ────────────────────────────────────────────────────────────────────
const VIVID = 1.25;
function pickColor(){
  let c;
  if (SETTINGS.lockedColor) c = SETTINGS.lockedColor;
  else { const cols = Anim.themes[currentTheme].colors; c = cols[colorIdx++ % cols.length]; }
  return [c[0]*VIVID, c[1]*VIVID, c[2]*VIVID];
}

const STANDARD_SWATCHES = [
  [1,0.12,0.12],[1,0.50,0.0],[1,0.90,0.05],[0.12,0.85,0.12],
  [0.0,0.80,1.0],[0.15,0.35,1.0],[0.65,0.15,1.0],[1,1,1],
];

// ── Audio engine ───────────────────────────────────────────────────────────────
let audioCtx=null, masterGain=null, convolver=null, reverbWet=null, echoWet=null, chorusWet=null, limiter=null;

const VOICES = {
  pure:  {label:'Pure',  oct:0,  gain:0.12, filter:{type:'lowpass', base:1300, track:1600}, lfo:{rate:5,depth:0.007},
    oscs:[{type:'sine'}]},
  warm:  {label:'Warm',  oct:0,  gain:0.13, filter:{type:'lowpass', base:780,  track:1100}, lfo:{rate:4,depth:0.005},
    oscs:[{type:'triangle'},{type:'sine',detune:7,gain:0.6},{type:'sine',detune:-7,gain:0.6}]},
  bell:  {label:'Bell',  oct:0,  gain:0.12, filter:{type:'lowpass', base:4500, track:2000}, lfo:{rate:0,depth:0},
    oscs:[{type:'sine'},{type:'sine',ratio:2.76,gain:0.5,decayTo:0.04},{type:'sine',ratio:5.4,gain:0.25,decayTo:0.02}]},
  glass: {label:'Glass', oct:0,  gain:0.13, filter:{type:'highpass',base:350,  track:250},  lfo:{rate:7,depth:0.012},
    oscs:[{type:'sine'},{type:'sine',ratio:3.0,gain:0.45,decayTo:0.35},{type:'sine',ratio:4.2,gain:0.22,decayTo:0.25}]},
  deep:  {label:'Deep',  oct:-1, gain:0.18, filter:{type:'lowpass', base:700,  track:900},  lfo:{rate:2,depth:0.005},
    oscs:[{type:'sine'},{type:'sine',ratio:2,gain:0.55},{type:'sine',ratio:3,gain:0.2}]},
  pluck: {label:'Pluck', oct:0,  gain:0.18, filter:{type:'lowpass', base:1800, track:1600}, lfo:{rate:0,depth:0}, pluck:1.6,
    oscs:[{type:'triangle'},{type:'sine',ratio:2,gain:0.3}]},
  synth: {label:'Synth', oct:0,  gain:0.10, filter:{type:'lowpass', base:600,  track:2800, q:7}, lfo:{rate:0,depth:0},
    oscs:[{type:'sawtooth'},{type:'sawtooth',detune:11,gain:0.7},{type:'sawtooth',detune:-11,gain:0.7}]},
  retro: {label:'Retro', oct:0,  gain:0.09, filter:{type:'lowpass', base:2600, track:1400}, lfo:{rate:6,depth:0.004},
    oscs:[{type:'square'}]},
  pad:   {label:'Pad',   oct:-1, gain:0.11, filter:{type:'lowpass', base:500,  track:1400, q:2}, lfo:{rate:3,depth:0.006},
    oscs:[{type:'sawtooth',detune:6,gain:0.6},{type:'sawtooth',detune:-6,gain:0.6},{type:'sine',ratio:2,gain:0.3}]},
};
const SCALES = {
  penta: {label:'Pentatonic', steps:[0,2,4,7,9]},
  major: {label:'Major',      steps:[0,2,4,5,7,9,11]},
  minor: {label:'Minor',      steps:[0,2,3,5,7,8,10]},
  whole: {label:'Whole-tone', steps:[0,2,4,6,8,10]},
};
let FREQS=[];
function buildScale(){
  const base=130.81, steps=(SCALES[SETTINGS.scale]||SCALES.penta).steps, arr=[];
  for(let oct=0;oct<3;oct++) for(const s of steps) arr.push(base*Math.pow(2,(s+12*oct)/12));
  FREQS=arr;
}
function freqForX(x){ const i=Math.max(0,Math.min(FREQS.length-1,Math.floor(x*FREQS.length))); return FREQS[i]||110; }

function makeImpulse(ac,dur,decay){
  const len=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(2,len,ac.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}
function getAudio(){
  if(!audioCtx){
    const ac=audioCtx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    masterGain=ac.createGain(); masterGain.gain.value=SETTINGS.mute?0:SETTINGS.volume;
    // Chorus
    const chDelay=ac.createDelay(); chDelay.delayTime.value=0.026;
    const chLfo=ac.createOscillator(); chLfo.frequency.value=0.6;
    const chDepth=ac.createGain(); chDepth.gain.value=0.004;
    chLfo.connect(chDepth); chDepth.connect(chDelay.delayTime); chLfo.start();
    chorusWet=ac.createGain(); chorusWet.gain.value=SETTINGS.chorus?0.6:0;
    const busA=ac.createGain();
    masterGain.connect(busA);
    masterGain.connect(chDelay); chDelay.connect(chorusWet); chorusWet.connect(busA);
    // Echo
    const ecDelay=ac.createDelay(); ecDelay.delayTime.value=0.33;
    const ecFb=ac.createGain(); ecFb.gain.value=0.42;
    ecDelay.connect(ecFb); ecFb.connect(ecDelay);
    echoWet=ac.createGain(); echoWet.gain.value=SETTINGS.echo?0.5:0;
    const busB=ac.createGain();
    busA.connect(busB);
    busA.connect(ecDelay); ecDelay.connect(echoWet); echoWet.connect(busB);
    // Limiter
    limiter=ac.createDynamicsCompressor();
    limiter.threshold.value=-3; limiter.knee.value=0; limiter.ratio.value=20;
    limiter.attack.value=0.003; limiter.release.value=0.25;
    limiter.connect(ac.destination);
    // Reverb
    convolver=ac.createConvolver(); convolver.buffer=makeImpulse(ac,3.8,2.0);
    reverbWet=ac.createGain(); reverbWet.gain.value=SETTINGS.reverb?0.9:0;
    busB.connect(limiter);
    busB.connect(convolver); convolver.connect(reverbWet); reverbWet.connect(limiter);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function applyVolume(){ if(masterGain) masterGain.gain.setTargetAtTime(SETTINGS.mute?0:SETTINGS.volume, audioCtx.currentTime, 0.05); }
function applyReverb(){ if(reverbWet) reverbWet.gain.setTargetAtTime(SETTINGS.reverb?0.9:0, audioCtx.currentTime, 0.1); }
function applyEcho(){   if(echoWet)   echoWet.gain.setTargetAtTime(SETTINGS.echo?0.5:0,     audioCtx.currentTime, 0.1); }
function applyChorus(){ if(chorusWet) chorusWet.gain.setTargetAtTime(SETTINGS.chorus?0.6:0, audioCtx.currentTime, 0.1); }

let voiceSeq=0; const voices={}; const MAX_VOICES=16;
function startVoice(x,y){
  try{
    if(Object.keys(voices).length>=MAX_VOICES) return 0;
    const ac=getAudio(), vid=++voiceSeq, V=VOICES[SETTINGS.voice]||VOICES.pure;
    const freq=freqForX(x)*Math.pow(2,V.oct), t=ac.currentTime;
    const gain=ac.createGain();
    const pan=ac.createStereoPanner(); pan.pan.value=(x*2-1)*0.6;
    const filt=ac.createBiquadFilter(); filt.type=V.filter.type; filt.frequency.value=V.filter.base+y*V.filter.track;
    if(V.filter.q) filt.Q.value=V.filter.q;
    filt.connect(gain); gain.connect(pan); pan.connect(masterGain);
    const nodes=[];
    for(const o of V.oscs){
      const ratio=o.ratio||1;
      const osc=ac.createOscillator(); osc.type=o.type||'sine'; osc.frequency.value=freq*ratio;
      if(o.detune) osc.detune.value=o.detune;
      const g=ac.createGain(); g.gain.setValueAtTime(o.gain!==undefined?o.gain:1, t);
      if(o.decayTo!==undefined) g.gain.setTargetAtTime((o.gain!==undefined?o.gain:1)*o.decayTo, t, 0.5);
      osc.connect(g); g.connect(filt); osc.start();
      nodes.push({osc,ratio});
    }
    let lfo=null;
    if(V.lfo.rate>0){
      lfo=ac.createOscillator(); const lfoG=ac.createGain();
      lfo.frequency.value=V.lfo.rate; lfoG.gain.value=freq*V.lfo.depth;
      lfo.connect(lfoG); nodes.forEach(n=>lfoG.connect(n.osc.frequency)); lfo.start();
    }
    gain.gain.setValueAtTime(0.0001,t);
    gain.gain.linearRampToValueAtTime(V.gain,t+0.02);
    if(V.pluck) gain.gain.exponentialRampToValueAtTime(0.0008, t+0.02+V.pluck);
    voices[vid]={nodes,lfo,gain,pan,filt,freq,V};
    return vid;
  }catch(e){ return 0; }
}
function moveVoice(vid,x,y,speed){
  const v=voices[vid]; if(!v) return;
  try{
    const now=getAudio().currentTime, V=v.V;
    v.freq=freqForX(x)*Math.pow(2,V.oct);
    v.nodes.forEach(n=>n.osc.frequency.setTargetAtTime(v.freq*n.ratio,now,0.06));
    v.pan.pan.setTargetAtTime((x*2-1)*0.6,now,0.08);
    v.filt.frequency.setTargetAtTime(V.filter.base+y*V.filter.track,now,0.08);
  }catch(e){}
}
function stopVoice(vid){
  const v=voices[vid]; if(!v) return;
  delete voices[vid];
  try{
    const ac=getAudio(), t=ac.currentTime;
    v.gain.gain.cancelScheduledValues(t);
    v.gain.gain.setValueAtTime(v.gain.gain.value,t);
    v.gain.gain.setTargetAtTime(0,t,0.25);
    const stopAt=t+1.2;
    v.nodes.forEach(n=>{try{n.osc.stop(stopAt);}catch(e){}});
    if(v.lfo){try{v.lfo.stop(stopAt);}catch(e){}}
    v.nodes[0].osc.onended=()=>{try{v.gain.disconnect();v.pan.disconnect();v.filt.disconnect();}catch(e){}};
  }catch(e){}
}

// ── Input (up to 5 independent touches + mouse fallback) ───────────────────────
class Pointer {
  constructor(id){ this.id=id; this.x=0; this.y=0; this.px=0; this.py=0;
    this.dx=0; this.dy=0; this.down=false; this.moved=false; this.color=[1,1,1]; this.voice=0; }
}
const pointers = [];
function getPointer(id){ let p=pointers.find(p=>p.id===id); if(!p){p=new Pointer(id); pointers.push(p);} return p; }
function toSim(x,y){ return { x: x/canvas.clientWidth, y: 1-y/canvas.clientHeight }; }

function onDown(id, cx, cy){
  const p=getPointer(id), s=toSim(cx,cy);
  p.x=s.x; p.y=s.y; p.px=s.x; p.py=s.y; p.dx=0; p.dy=0;
  p.down=true; p.moved=false; p.color=pickColor();
  if(p.voice) stopVoice(p.voice);
  p.voice=startVoice(s.x,s.y);
}
function onMove(id, cx, cy){
  const p=pointers.find(p=>p.id===id);
  if(!p || !p.down) return;
  const s=toSim(cx,cy);
  p.dx=s.x-p.x; p.dy=s.y-p.y; p.x=s.x; p.y=s.y;
  moveVoice(p.voice, s.x, s.y, Math.hypot(p.dx,p.dy));
}
function onUp(id){
  const i=pointers.findIndex(p=>p.id===id); if(i<0) return;
  const p=pointers[i]; p.down=false; stopVoice(p.voice); p.voice=0;
  pointers.splice(i,1);
}

// ── Lifecycle / render loop ──────────────────────────────────────────────────────
let glLost=false, lastTime=Date.now(), fpsAccum=0, fpsFrames=0;
function sizeCanvas(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=Math.round(canvas.clientWidth*dpr), h=Math.round(canvas.clientHeight*dpr);
  if(canvas.width!==w || canvas.height!==h){ canvas.width=w; canvas.height=h; if(Anim.resize) Anim.resize(w,h); }
}
function setupGL(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.round(canvas.clientWidth*dpr)||canvas.width;
  canvas.height=Math.round(canvas.clientHeight*dpr)||canvas.height;
  if(Anim.init) Anim.init(canvas);
  if(Anim.resize) Anim.resize(canvas.width,canvas.height);
}
function loop(){
  if(glLost){ requestAnimationFrame(loop); return; }
  sizeCanvas();
  const now=Date.now(), rawDt=(now-lastTime)/1000; lastTime=now;
  const dt=Math.min(rawDt,0.033);  // cap at ~30fps equivalent; prevents physics explosion without causing slow-motion
  fpsAccum+=rawDt; fpsFrames++;    // use real elapsed time so FPS counter reflects actual frame rate
  if(fpsAccum>=1){ const fps=fpsFrames/fpsAccum; fpsAccum=0; fpsFrames=0;
    if(SETTINGS.quality==='auto') autoPerf(fps);
    if(SETTINGS.showStats) updateStats(fps); }
  const cap = perfLevel==='low'?4 : perfLevel==='med'?6 : 10;
  for(const p of pointers){
    if(p.down){
      const mdx=p.x-p.px, mdy=p.y-p.py, dist=Math.hypot(mdx,mdy);
      if(!p.moved){ Anim.splat(p.x,p.y,0,0,p.color,{velScale:0}); p.moved=true; }
      else if(dist>0.00001){
        const steps=Math.min(Math.max(1,Math.ceil(dist/0.012)),cap);
        for(let i=1;i<=steps;i++){ const t=i/steps; Anim.splat(p.px+mdx*t,p.py+mdy*t,p.dx,p.dy,p.color,{velScale:1/steps}); }
      }
      p.px=p.x; p.py=p.y; p.dx*=0.85; p.dy*=0.85;
    }
  }
  Anim.frame(dt);
  requestAnimationFrame(loop);
}
function boot(){
  initSettings();
  buildScale();
  buildControlsPanel();
  buildSoundPanel();
  setTheme(currentTheme);
  applyBg();
  applyStats();
  if(!Anim.styles) document.getElementById('btnStyle').style.display='none';
  setupGL();
  canvas.addEventListener('webglcontextlost', e=>{ e.preventDefault(); glLost=true; }, false);
  canvas.addEventListener('webglcontextrestored', ()=>{ glLost=false; setupGL(); }, false);
  loop();
}

/* ===== ANIMATION START =====
   Physarum / Slime Mould — GPU Physarum polycephalum simulation.
   Up to 262 144 agents deposit pheromone trail, sense it at three forward
   angles and steer toward the strongest reading. Trail diffuses and decays
   each step, forming self-organising branching networks.
   Requires WebGL2 + EXT_color_buffer_float.
*/
const Anim = (() => {

  // ── State ──────────────────────────────────────────────────────────────
  let gl;
  let W = 0, H = 0;
  let agentTexW = 512, agentTexH = 512;
  let trailW = 0, trailH = 0;
  let agentFBO = null, trailFBO = null;
  let pAgent, pDeposit, pDiffuse, pDisplay, pBurst, pRepel;
  let quadBuf = null, indexBuf = null;
  let floatLinear = false;
  let activePresetKey = null;

  // ── Shaders ────────────────────────────────────────────────────────────
  const VS_QUAD = `#version 300 es
in vec2 a_pos;out vec2 v_uv;
void main(){v_uv=a_pos*.5+.5;gl_Position=vec4(a_pos,0.,1.);}`;

  // Agent update: sense trail, turn, move. Preserves hue in .a
  const FS_AGENT = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_agents;
uniform sampler2D u_trail;
uniform float u_speed;
uniform float u_sa;
uniform float u_sd;
uniform vec2  u_tr;
uniform float u_time;
out vec4 frag;
float rnd(vec2 p){p=fract(p*vec2(23.3,47.1));p+=dot(p,p+33.3);return fract(p.x*p.y);}
float sense(vec2 pos,float ang){
  return texture(u_trail,fract(pos+vec2(cos(ang),sin(ang))/u_tr*u_sd)).r;
}
void main(){
  vec4 ag=texture(u_agents,v_uv);
  float x=ag.r,y=ag.g,a=ag.b,h=ag.a;
  float sF=sense(vec2(x,y),a);
  float sL=sense(vec2(x,y),a+u_sa);
  float sR=sense(vec2(x,y),a-u_sa);
  float r=rnd(v_uv+fract(vec2(u_time*.07,u_time*.13)))-.5;
  float turn=0.;
  if(sF>=sL&&sF>=sR) turn=r*.08;
  else if(sL>sR)      turn= u_sa*.5;
  else if(sR>sL)      turn=-u_sa*.5;
  else                turn= r*u_sa;
  a+=turn;
  frag=vec4(fract(x+cos(a)*u_speed/u_tr.x),fract(y+sin(a)*u_speed/u_tr.y),a,h);
}`;

  // Deposit: passes per-agent hue as a varying so each point colours its trail pixel.
  const VS_DEPOSIT = `#version 300 es
precision highp float;
in float a_idx;
uniform sampler2D u_agents;
uniform ivec2 u_asize;
uniform float u_width;
out float v_hue;
void main(){
  int i=int(a_idx);
  vec4 ag=texelFetch(u_agents,ivec2(i%u_asize.x,i/u_asize.x),0);
  gl_Position=vec4(ag.r*2.-1.,ag.g*2.-1.,0.,1.);
  gl_PointSize=max(u_width,1.);
  v_hue=ag.a;
}`;

  // Trail stores (intensity, intensity*hue) in RG — intensity-weighted hue average.
  const FS_DEPOSIT = `#version 300 es
precision highp float;
in float v_hue;
uniform float u_dep;
out vec4 frag;
void main(){frag=vec4(u_dep,u_dep*v_hue,0.,1.);}`;

  // Diffuse + decay: blur amount controlled by u_blur (0=no spread, 1=full 3×3).
  const FS_DIFFUSE = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_trail;
uniform vec2 u_tr;
uniform float u_decay;
uniform float u_blur;
out vec4 frag;
void main(){
  vec2 t=1./u_tr;
  vec2 center=texture(u_trail,v_uv).rg;
  vec2 blurred=vec2(0.);
  for(int dx=-1;dx<=1;dx++)
    for(int dy=-1;dy<=1;dy++)
      blurred+=texture(u_trail,v_uv+vec2(float(dx),float(dy))*t).rg;
  blurred/=9.;
  vec2 s=mix(center,blurred,u_blur);
  frag=vec4(max(s*u_decay,vec2(0.)),0.,1.);
}`;

  // Display: recover weighted-average hue from RG trail, render as HSL.
  const FS_DISPLAY = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_trail;
uniform float u_bright;
uniform float u_lMax;
uniform float u_sat;
out vec4 frag;
vec3 hsl2rgb(float h,float s,float l){
  vec3 rgb=clamp(abs(mod(h*6.+vec3(0.,4.,2.),6.)-3.)-1.,0.,1.);
  return l+s*(rgb-.5)*(1.-abs(2.*l-1.));
}
void main(){
  vec2 tr=texture(u_trail,v_uv).rg;
  float intensity=clamp(tr.r*u_bright,0.,1.);
  float hue=(tr.r>0.001)?clamp(tr.g/tr.r,0.,1.):0.;
  frag=vec4(hsl2rgb(hue,u_sat,sqrt(intensity)*u_lMax),1.);
}`;

  // Burst: teleport a random subset of agents to the touch point with touch hue.
  const FS_BURST = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_agents;
uniform vec2  u_pt;
uniform float u_hue;
uniform float u_prob;
uniform float u_time;
uniform float u_aspect; // trailH/trailW — corrects oval to circle
uniform float u_size;
out vec4 frag;
uniform int u_rays; // 0=random spread, N=N discrete rays
float rnd(vec2 p){p=fract(p*vec2(23.3,47.1));p+=dot(p,p+33.3);return fract(p.x*p.y);}
void main(){
  vec4 ag=texture(u_agents,v_uv);
  if(rnd(v_uv+fract(vec2(u_time*.07,u_time*.13)))<u_prob){
    float r2=rnd(v_uv+fract(vec2(u_time*.17,u_time*.19)));
    float r3=rnd(v_uv+fract(vec2(u_time*.23,u_time*.29)));
    float angle;
    if(u_rays>0){
      float ray=floor(r2*float(u_rays)+0.5);
      angle=ray/float(u_rays)*6.2832;
      angle+=(rnd(v_uv+fract(vec2(u_time*.31,u_time*.37)))-.5)*0.35;
    } else {
      angle=r2*6.2832;
    }
    vec2 pos=fract(u_pt+vec2(cos(angle)*u_aspect,sin(angle))*r3*u_size);
    frag=vec4(pos,angle,u_hue);
  } else {
    frag=ag;
  }
}`;

  // Repel: gaussian blob that erases trail (used with FUNC_REVERSE_SUBTRACT blending).
  const FS_REPEL = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform vec2  u_pt;
uniform float u_str;
uniform float u_aspect; // trailH/trailW — corrects oval to circle
uniform float u_size;
out vec4 frag;
void main(){
  vec2 delta=v_uv-u_pt;
  float d=length(vec2(delta.x/u_aspect,delta.y));
  float sigma=u_size*0.5;
  frag=vec4(exp(-d*d/(sigma*sigma*2.))*u_str,0.,0.,1.);
}`;

  // ── GL helpers ─────────────────────────────────────────────────────────
  function sh(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.error('Shader error:', gl.getShaderInfoLog(s));
    return s;
  }
  function mkProg(vSrc, fSrc, a0) {
    const vs = sh(gl.VERTEX_SHADER, vSrc), fs = sh(gl.FRAGMENT_SHADER, fSrc);
    const p = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, fs);
    if (a0) gl.bindAttribLocation(p, 0, a0);
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS))
      console.error('Link error:', gl.getProgramInfoLog(p));
    gl.deleteShader(vs); gl.deleteShader(fs);
    const n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS), u = {};
    for (let i = 0; i < n; i++) {
      const info = gl.getActiveUniform(p, i);
      u[info.name] = gl.getUniformLocation(p, info.name);
    }
    return { p, u };
  }
  function mkFBO(w, h, iF, f, t) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, iF, w, h, 0, f, t, null);
    // Float textures require NEAREST unless OES_texture_float_linear is enabled
    const filt = floatLinear ? gl.LINEAR : gl.NEAREST;
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filt);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filt);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    return { fbo, tex, w, h };
  }
  function mkDbl(w, h, iF, f, t) {
    return { read: mkFBO(w, h, iF, f, t), write: mkFBO(w, h, iF, f, t) };
  }
  function delDbl(fb) {
    if (!fb) return;
    [fb.read, fb.write].forEach(b => { gl.deleteFramebuffer(b.fbo); gl.deleteTexture(b.tex); });
  }
  function swap(fb) { const t = fb.read; fb.read = fb.write; fb.write = t; }

  function setQuad() {
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  }

  // ── Resource builders ──────────────────────────────────────────────────
  function buildAgentFBOs() {
    delDbl(agentFBO);
    agentFBO = mkDbl(agentTexW, agentTexH, gl.RGBA32F, gl.RGBA, gl.FLOAT);
  }
  function buildTrailFBOs() {
    const base = { high:1280, med:1024, low:768 }[activeQuality()] || 1280;
    const ar = W / Math.max(H, 1);
    const res = ar >= 1
      ? { w: Math.round(base), h: Math.round(base / ar) }
      : { w: Math.round(base * ar), h: Math.round(base) };
    trailW = res.w; trailH = res.h;
    delDbl(trailFBO);
    trailFBO = mkDbl(trailW, trailH, gl.RG32F, gl.RG, gl.FLOAT);
  }
  function buildIndexBuf() {
    const N = agentTexW * agentTexH, d = new Float32Array(N);
    for (let i = 0; i < N; i++) d[i] = i;
    if (!indexBuf) indexBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, indexBuf);
    gl.bufferData(gl.ARRAY_BUFFER, d, gl.DYNAMIC_DRAW);
  }
  function randomiseAgents() {
    const th = Anim.themes[currentTheme] || Object.values(Anim.themes)[0];
    const hMin = th.hueMin || 0, hRange = (th.hueMax || 1) - hMin;
    const N = agentTexW * agentTexH, d = new Float32Array(N * 4);
    for (let i = 0; i < N; i++) {
      const x = Math.random(), y = Math.random();
      d[i*4]   = x;
      d[i*4+1] = y;
      d[i*4+2] = Math.random() * Math.PI * 2;
      // Hue follows x position so different screen regions start with different colours
      d[i*4+3] = hMin + (x * hRange);
    }
    [agentFBO.read, agentFBO.write].forEach(b => {
      gl.bindTexture(gl.TEXTURE_2D, b.tex);
      gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, agentTexW, agentTexH, gl.RGBA, gl.FLOAT, d);
    });
  }
  function clearTrail() {
    [trailFBO.read, trailFBO.write].forEach(b => {
      gl.bindFramebuffer(gl.FRAMEBUFFER, b.fbo);
      gl.clearColor(0, 0, 0, 0); gl.clear(gl.COLOR_BUFFER_BIT);
    });
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  }

  // ── Presets: each sets sensor/deposit/brightness/decay as a package ──────
  const PRESETS = {
    gossamer: { label:'Gossamer', sa:20, sd:3,  dep:0.6, bright:10,  decay:.88 },
    dense:    { label:'Dense',    sa:55, sd:12, dep:7,   bright:1.8, decay:.97 },
    rivers:   { label:'Rivers',   sa:40, sd:22, dep:4,   bright:2.8, decay:.985},
    chaos:    { label:'Chaos',    sa:8,  sd:2,  dep:2,   bright:5,   decay:.93 },
  };

  // ── Public Anim object ─────────────────────────────────────────────────
  return {
    sectionLabel: 'Simulation',

    themes: {
      mycelium: { label:'🍄 Mycelium', colors:[[0,1,.5],[.2,.9,.6],[0,.8,.4],[.1,1,.7],[.3,.8,.5]], hueMin:.25,hueMax:.50, lMax:.55, sat:.9  },
      neon:     { label:'⚡ Neon',     colors:[[1,0,.8],[0,1,.9],[.8,0,1],[0,.8,1],[1,.2,.5]],      hueMin:0,  hueMax:1,   lMax:.80, sat:1.0 },
      gold:     { label:'🌕 Gold',     colors:[[1,.6,0],[1,.8,.1],[1,.4,0],[.9,.7,0],[1,.9,.2]],    hueMin:.08,hueMax:.17, lMax:.65, sat:.9  },
      biolum:   { label:'🌊 Biolum',   colors:[[0,.9,.7],[0,.6,1],[.1,1,.8],[0,.4,.8],[.2,.8,1]],   hueMin:.50,hueMax:.65, lMax:.65, sat:.85 },
      ember:    { label:'🔥 Ember',    colors:[[1,.2,0],[1,.5,0],[.9,.1,0],[1,.7,0],[1,.3,.05]],    hueMin:0,  hueMax:.12, lMax:.65, sat:.95 },
    },

    defaults: {
      theme:'neon', preset:'gossamer', agentSpeed:1.5, trailWidth:1,
      brightness:2.0, satMult:1.0, burstRays:6, touchSize:0.04, repel:false,
    },

    schema: [
      { type:'preset-chips', label:'Style', key:'preset', options:{
        gossamer:{label:'Gossamer'}, dense:{label:'Dense'},
        rivers:{label:'Rivers'},    chaos:{label:'Chaos'},
      }},
      { key:'agentSpeed',  label:'Speed',       min:.2,  max:2.5, step:.1,   dp:1 },
      { key:'trailWidth',  label:'Trail Width',  min:1,   max:4,   step:1,    dp:0 },
      { key:'brightness',  label:'Brightness',   min:.25, max:4,   step:.25,  dp:2 },
      { key:'satMult',     label:'Colour',       min:0,   max:1,   step:.05,  dp:2 },
      { key:'burstRays',   label:'Touch Rays',   min:0,   max:12,  step:1,    dp:0 },
      { key:'touchSize',   label:'Touch Size',   min:.02, max:.12, step:.01,  dp:2 },
      { key:'repel',       label:'Repel',        type:'toggle' },
    ],

    init(cv) {
      if (!gl) {
        gl = cv.getContext('webgl2', { alpha:false, antialias:false, depth:false, stencil:false });
        if (!gl) {
          document.body.innerHTML = '<p style="color:#f88;font:18px sans-serif;padding:2em">WebGL 2 is required for Slime Mould. Please use a modern browser.</p>';
          return;
        }
        if (!gl.getExtension('EXT_color_buffer_float')) {
          console.warn('EXT_color_buffer_float not available — float render targets may fail');
        }
        gl.getExtension('EXT_float_blend');
        floatLinear = !!gl.getExtension('OES_texture_float_linear');
      }
      // Always rebuild programs and resources (handles context restore too)
      pAgent   = mkProg(VS_QUAD,    FS_AGENT,   'a_pos');
      pDeposit = mkProg(VS_DEPOSIT, FS_DEPOSIT, 'a_idx');
      pDiffuse = mkProg(VS_QUAD,    FS_DIFFUSE, 'a_pos');
      pDisplay = mkProg(VS_QUAD,    FS_DISPLAY, 'a_pos');
      pBurst   = mkProg(VS_QUAD,    FS_BURST,   'a_pos');
      pRepel   = mkProg(VS_QUAD,    FS_REPEL,   'a_pos');

      quadBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

      W = cv.width; H = cv.height;
      const q = activeQuality();
      [agentTexW, agentTexH] = ({ high:[512,512], med:[384,384], low:[256,256] })[q] || [512,512];
      buildAgentFBOs();
      buildIndexBuf();
      buildTrailFBOs();
      randomiseAgents();
      clearTrail();
      activePresetKey = SETTINGS.preset || 'dense';
    },

    resize(w, h) {
      W = w; H = h;
      if (!gl || !trailFBO) return;
      buildTrailFBOs();
      clearTrail();
    },

    splat(x, y, dx, dy, color, opts) {
      if (!gl) return;
      const sz = SETTINGS.touchSize || 0.05;
      const aspect = trailH / Math.max(trailW, 1);
      if (SETTINGS.repel) {
        if (!trailFBO) return;
        const pr = PRESETS[SETTINGS.preset] || PRESETS.dense;
        const P = pRepel;
        gl.useProgram(P.p);
        gl.uniform2f(P.u['u_pt'],     x, y);
        gl.uniform1f(P.u['u_str'],    pr.dep * 2.0);
        gl.uniform1f(P.u['u_aspect'], aspect);
        gl.uniform1f(P.u['u_size'],   sz);
        gl.enable(gl.BLEND);
        gl.blendEquation(gl.FUNC_REVERSE_SUBTRACT);
        gl.blendFunc(gl.ONE, gl.ONE);
        gl.bindFramebuffer(gl.FRAMEBUFFER, trailFBO.read.fbo);
        gl.viewport(0, 0, trailW, trailH);
        setQuad(); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        gl.disable(gl.BLEND); gl.blendEquation(gl.FUNC_ADD);
      } else {
        if (!agentFBO) return;
        const [r, g, b] = color;
        const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
        let hue = 0;
        if (d > 0) {
          if      (max === r) hue = ((g-b)/d + (g<b?6:0)) / 6;
          else if (max === g) hue = ((b-r)/d + 2) / 6;
          else                hue = ((r-g)/d + 4) / 6;
        }
        const prob = (opts && opts.velScale === 0) ? 0.20 : 0.008;
        const P = pBurst;
        gl.useProgram(P.p);
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, agentFBO.read.tex);
        gl.uniform1i(P.u['u_agents'], 0);
        gl.uniform2f(P.u['u_pt'],     x, y);
        gl.uniform1f(P.u['u_hue'],    hue);
        gl.uniform1f(P.u['u_prob'],   prob);
        gl.uniform1f(P.u['u_time'],   performance.now() * 0.001 % 1000);
        gl.uniform1f(P.u['u_aspect'], aspect);
        gl.uniform1f(P.u['u_size'],   sz);
        gl.uniform1i(P.u['u_rays'],   Math.round(SETTINGS.burstRays) || 0);
        gl.disable(gl.BLEND);
        gl.bindFramebuffer(gl.FRAMEBUFFER, agentFBO.write.fbo);
        gl.viewport(0, 0, agentTexW, agentTexH);
        setQuad(); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        swap(agentFBO);
      }
    },

    frame(dt) {
      if (!gl || !agentFBO || !trailFBO) return;
      const key = SETTINGS.preset || 'dense';
      if (key !== activePresetKey) {
        activePresetKey = key;
        clearTrail();
        randomiseAgents();
      }
      const pr = PRESETS[key] || PRESETS.dense;
      const sa = pr.sa * Math.PI / 180;
      const t  = performance.now() * 0.001 % 1000;

      // 1 — Agent update: sense trail, turn, move → write new positions
      {
        const P = pAgent;
        gl.useProgram(P.p);
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, agentFBO.read.tex); gl.uniform1i(P.u['u_agents'], 0);
        gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, trailFBO.read.tex); gl.uniform1i(P.u['u_trail'],  1);
        gl.uniform1f(P.u['u_speed'], SETTINGS.agentSpeed);
        gl.uniform1f(P.u['u_sa'],    sa);
        gl.uniform1f(P.u['u_sd'],    pr.sd);
        gl.uniform2f(P.u['u_tr'],    trailW, trailH);
        gl.uniform1f(P.u['u_time'],  t);
        gl.disable(gl.BLEND);
        gl.bindFramebuffer(gl.FRAMEBUFFER, agentFBO.write.fbo);
        gl.viewport(0, 0, agentTexW, agentTexH);
        setQuad(); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        swap(agentFBO);
      }

      // 2 — Deposit: render each agent as a point onto the trail texture
      {
        const P = pDeposit;
        gl.useProgram(P.p);
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, agentFBO.read.tex); gl.uniform1i(P.u['u_agents'], 0);
        gl.uniform2i(P.u['u_asize'], agentTexW, agentTexH);
        gl.uniform1f(P.u['u_dep'],   pr.dep * 0.012);
        gl.uniform1f(P.u['u_width'], SETTINGS.trailWidth || 2);
        gl.enable(gl.BLEND); gl.blendEquation(gl.FUNC_ADD); gl.blendFunc(gl.ONE, gl.ONE);
        gl.bindBuffer(gl.ARRAY_BUFFER, indexBuf);
        gl.enableVertexAttribArray(0);
        gl.vertexAttribPointer(0, 1, gl.FLOAT, false, 0, 0);
        gl.bindFramebuffer(gl.FRAMEBUFFER, trailFBO.read.fbo);
        gl.viewport(0, 0, trailW, trailH);
        gl.drawArrays(gl.POINTS, 0, agentTexW * agentTexH);
        gl.disable(gl.BLEND);
      }

      // 3 — Diffuse + decay: 3×3 blur and multiply by decayRate
      {
        const P = pDiffuse;
        gl.useProgram(P.p);
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, trailFBO.read.tex); gl.uniform1i(P.u['u_trail'], 0);
        gl.uniform2f(P.u['u_tr'],    trailW, trailH);
        gl.uniform1f(P.u['u_decay'], pr.decay);
        gl.uniform1f(P.u['u_blur'],  Math.min(Math.max((SETTINGS.trailWidth - 1) / 3, 0), 1));
        gl.disable(gl.BLEND);
        gl.bindFramebuffer(gl.FRAMEBUFFER, trailFBO.write.fbo);
        gl.viewport(0, 0, trailW, trailH);
        setQuad(); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        swap(trailFBO);
      }

      // 4 — Display: decode hue from RG trail, render as HSL
      {
        const th = this.themes[currentTheme];
        const P = pDisplay;
        gl.useProgram(P.p);
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, trailFBO.read.tex); gl.uniform1i(P.u['u_trail'], 0);
        gl.uniform1f(P.u['u_bright'], pr.bright * (SETTINGS.brightness || 1.0));
        gl.uniform1f(P.u['u_lMax'],   th.lMax);
        gl.uniform1f(P.u['u_sat'],    th.sat * (SETTINGS.satMult ?? 1.0));
        gl.disable(gl.BLEND);
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, W, H);
        setQuad(); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }
    },

    reset() {
      if (!gl || !agentFBO || !trailFBO) return;
      clearTrail();
      randomiseAgents();
    },

    setQuality(level) {
      if (!gl) return;
      [agentTexW, agentTexH] = ({ high:[512,512], med:[384,384], low:[256,256] })[level] || [512,512];
      buildAgentFBOs();
      buildIndexBuf();
      randomiseAgents();
    },
  };
})();
/* ===== ANIMATION END ===== */

boot();
</script>
</body>
</html>
